'server/prisma/schema.prisma':{g:'s',i:'🔷',l:'prisma',n:'schema.prisma',d:'prisma/',c:`generator client { provider = "prisma-client-js" }
datasource db { provider = "postgresql"; url = env("DATABASE_URL"); directUrl = env("DIRECT_URL") }

enum Role { USER ADMIN }
enum Track { FRONTEND BACKEND FULLSTACK }
enum Difficulty { EASY MEDIUM HARD MIXED }
enum QuestionType { MULTIPLE_CHOICE SINGLE_CHOICE OPEN_ENDED }
enum CategoryGroup { FRONTEND BACKEND GENERAL }
enum NotifType { QUIZ_RESULT ACHIEVEMENT ROADMAP SYSTEM }
enum AchievementCondition { QUIZ_COUNT SCORE STREAK CATEGORY }

model User {
  id String @id @default(uuid())
  email String @unique
  passwordHash String
  fullName String
  avatarUrl String?
  role Role @default(USER)
  track Track?
  isVerified Boolean @default(false)
  verifyToken String?
  resetToken String?
  resetTokenExp DateTime?
  refreshToken String?
  streakCount Int @default(0)
  lastActive DateTime?
  createdAt DateTime @default(now())
  updatedAt DateTime @updatedAt
  quizResults QuizResult[]
  bookmarks Bookmark[]
  notifications Notification[]
  achievements UserAchievement[]
  roadmapProgress RoadmapProgress[]
  aiSessions AISession[]
  adminLogs AdminLog[]
  @@map("users")
}
model Category {
  id String @id @default(uuid())
  name String @unique; slug String @unique
  group CategoryGroup; icon String?
  createdAt DateTime @default(now())
  questions Question[]
  @@map("categories")
}
model Question {
  id String @id @default(uuid())
  categoryId String
  category Category @relation(fields: [categoryId], references: [id])
  title String; type QuestionType; difficulty Difficulty
  options Json?; correctAnswer String?; explanation String?
  tags String[] @default([])
  isActive Boolean @default(true); createdById String?
  createdAt DateTime @default(now()); updatedAt DateTime @updatedAt
  quizQuestions QuizQuestion[]; bookmarks Bookmark[]
  @@map("questions")
}
model Quiz {
  id String @id @default(uuid())
  title String; description String?; type Track; difficulty Difficulty
  timeLimit Int; questionCount Int; isActive Boolean @default(true)
  createdById String?; createdAt DateTime @default(now())
  questions QuizQuestion[]; results QuizResult[]
  @@map("quizzes")
}
model QuizQuestion {
  quizId String; questionId String; orderIndex Int
  quiz Quiz @relation(fields: [quizId], references: [id], onDelete: Cascade)
  question Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@id([quizId, questionId])
  @@map("quiz_questions")
}
model QuizResult {
  id String @id @default(uuid())
  userId String; quizId String; score Int; total Int
  percentage Float; timeSpent Int; answers Json
  completedAt DateTime @default(now())
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  quiz Quiz @relation(fields: [quizId], references: [id], onDelete: Cascade)
  @@map("quiz_results")
}
model Bookmark {
  id String @id @default(uuid())
  userId String; questionId String; createdAt DateTime @default(now())
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  question Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@unique([userId, questionId])
  @@map("bookmarks")
}
model RoadmapNode {
  id String @id @default(uuid()); track Track; title String
  description String?; orderIndex Int; parentId String?
  resources Json?; isMilestone Boolean @default(false)
  parent RoadmapNode? @relation("NodeChildren", fields: [parentId], references: [id])
  children RoadmapNode[] @relation("NodeChildren")
  progress RoadmapProgress[]
  @@map("roadmap_nodes")
}
model RoadmapProgress {
  userId String; nodeId String; isCompleted Boolean @default(false); completedAt DateTime?
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  node RoadmapNode @relation(fields: [nodeId], references: [id], onDelete: Cascade)
  @@id([userId, nodeId])
  @@map("roadmap_progress")
}
model AISession {
  id String @id @default(uuid()); userId String
  questionText String; userAnswer String; aiScore Int
  aiFeedback String; idealAnswer String; resources Json?
  createdAt DateTime @default(now())
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("ai_sessions")
}
model Achievement {
  id String @id @default(uuid()); slug String @unique
  title String; description String?; icon String?
  conditionType AchievementCondition; conditionValue Int
  userAchievements UserAchievement[]
  @@map("achievements")
}
model UserAchievement {
  userId String; achievementId String; earnedAt DateTime @default(now())
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  achievement Achievement @relation(fields: [achievementId], references: [id], onDelete: Cascade)
  @@id([userId, achievementId])
  @@map("user_achievements")
}
model Notification {
  id String @id @default(uuid()); userId String; type NotifType
  title String; message String?; isRead Boolean @default(false)
  createdAt DateTime @default(now())
  user User @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("notifications")
}
model AdminLog {
  id String @id @default(uuid()); adminId String
  action String; target String?; details Json?
  createdAt DateTime @default(now())
  admin User @relation(fields: [adminId], references: [id], onDelete: Cascade)
  @@map("admin_logs")
}`},

import bcrypt from 'bcryptjs'

  console.log('🌱 Seed boshlandi...')

    prisma.category.upsert({ where:{slug:'javascript'}, update:{}, create:{name:'JavaScript',slug:'javascript',group:'FRONTEND',icon:'javascript'} }),
    prisma.category.upsert({ where:{slug:'typescript'}, update:{}, create:{name:'TypeScript',slug:'typescript',group:'FRONTEND',icon:'typescript'} }),
    prisma.category.upsert({ where:{slug:'react'}, update:{}, create:{name:'React',slug:'react',group:'FRONTEND',icon:'react'} }),
    prisma.category.upsert({ where:{slug:'nextjs'}, update:{}, create:{name:'Next.js',slug:'nextjs',group:'FRONTEND',icon:'nextjs'} }),
    prisma.category.upsert({ where:{slug:'nodejs'}, update:{}, create:{name:'Node.js',slug:'nodejs',group:'BACKEND',icon:'nodejs'} }),
    prisma.category.upsert({ where:{slug:'express'}, update:{}, create:{name:'Express.js',slug:'express',group:'BACKEND',icon:'express'} }),
    prisma.category.upsert({ where:{slug:'databases'}, update:{}, create:{name:'Databases',slug:'databases',group:'BACKEND',icon:'database'} }),
    prisma.category.upsert({ where:{slug:'git'}, update:{}, create:{name:'Git & GitHub',slug:'git',group:'GENERAL',icon:'git'} }),
    prisma.category.upsert({ where:{slug:'oop'}, update:{}, create:{name:'OOP',slug:'oop',group:'GENERAL',icon:'oop'} }),
  ])

  const js = cats.find(c=>c.slug==='javascript')!
  const react = cats.find(c=>c.slug==='react')!
  const node = cats.find(c=>c.slug==='nodejs')!

  // QUESTIONS
  await Promise.all([
    prisma.question.create({ data: {
      categoryId: js.id, title: "=== va == farqi nima?",
      type:'SINGLE_CHOICE', difficulty:'EASY',
      options: [
        {id:'a',text:'=== faqat qiymat solishtiradi',isCorrect:false},
        {id:'b',text:'=== qiymat va tur solishtiradi, == faqat qiymat',isCorrect:true},
        {id:'c',text:'Ikkalasi bir xil',isCorrect:false},
      ],
      explanation: '=== strict equality: qiymat + tur. == type coercion qiladi.',
      tags:['operators','basics'],
    }}),
    prisma.question.create({ data: {
      categoryId: js.id, title: "var, let, const farqlari nima?",
      type:'OPEN_ENDED', difficulty:'MEDIUM',
      correctAnswer: "var: function scope, hoisting. let: block scope, reassign mumkin. const: block scope, reassign mumkin emas.",
      tags:['variables','scope','es6'],
    }}),
    prisma.question.create({ data: {
      categoryId: js.id, title: "Closure nima?",
      type:'OPEN_ENDED', difficulty:'MEDIUM',
      correctAnswer: "Closure - funktsiya tashqi scope'dagi o'zgaruvchilarga kirish imkoniyatini saqlab qoladi. Encapsulation, factory functions uchun ishlatiladi.",
      tags:['closure','scope'],
    }}),
    prisma.question.create({ data: {
      categoryId: react.id, title: "useState hook qanday ishlaydi?",
      type:'OPEN_ENDED', difficulty:'EASY',
      correctAnswer: "useState: functional component da state saqlash. [state, setState] qaytaradi. setState chaqirilganda re-render bo'ladi.",
      tags:['hooks','useState'],
    }}),
    prisma.question.create({ data: {
      categoryId: node.id, title: "Event Loop nima?",
      type:'OPEN_ENDED', difficulty:'HARD',
      correctAnswer: "Event Loop: Node.js async mexanizmi. Call stack, callback queue, microtask queue. Stack bo'sh bo'lganda queue'dan vazifalar bajariladi.",
      tags:['event-loop','async'],
    }}),
  ])
  console.log('✅ Savollar yaratildi')

  // ACHIEVEMENTS
  await Promise.all([
    prisma.achievement.upsert({ where:{slug:'first-test'}, update:{}, create:{slug:'first-test',title:'Birinchi qadam',description:'Birinchi testni yakunlading',icon:'🎯',conditionType:'QUIZ_COUNT',conditionValue:1} }),
    prisma.achievement.upsert({ where:{slug:'10-tests'}, update:{}, create:{slug:'10-tests',title:'Izchil o\'quvchi',description:'10 ta test',icon:'🔥',conditionType:'QUIZ_COUNT',conditionValue:10} }),
    prisma.achievement.upsert({ where:{slug:'50-tests'}, update:{}, create:{slug:'50-tests',title:'Pro daraja',description:'50 ta test',icon:'💎',conditionType:'QUIZ_COUNT',conditionValue:50} }),
  ])
  console.log('✅ Achievementlar')

  // ROADMAP
  const frontendNodes = [

    {title:'TypeScript',orderIndex:7,isMilestone:false},
    {title:'Next.js',orderIndex:8,isMilestone:true},
  ]
  for (const n of frontendNodes) {
    await prisma.roadmapNode.upsert({
      where:{id:\`frontend-\${n.orderIndex}\`},
      update:{}, create:{id:\`frontend-\${n.orderIndex}\`,track:'FRONTEND',...n},
    })
  }
  console.log('✅ Roadmap yaratildi')

  // ADMIN USER
  const hash = await bcrypt.hash('Admin123!',12)
  await prisma.user.upsert({
    where:{email:'admin@devprep.ai'}, update:{},
    create:{email:'admin@devprep.ai',passwordHash:hash,fullName:'DevPrep Admin',role:'ADMIN',isVerified:true},

  console.log('✅ Admin: admin@devprep.ai / Admin123!')
  console.log('🎉 Seed yakunlandi!')
}

main().catch(console.error).finally(()=>prisma.$disconnect())`},

'server/src/app.ts':{g:'s',i:'🚀',l:'ts',n:'app.ts',d:'src/',c:`import express from 'express'
import cors from 'cors'
import helmet from 'helmet'
import morgan from 'morgan'

import { env } from './config/env'
import { globalLimiter, authLimiter, aiLimiter } from './middleware/rateLimit'
import authRoutes from './modules/auth/auth.routes'
import questionsRoutes from './modules/questions/questions.routes'
import quizzesRoutes from './modules/quizzes/quizzes.routes'
import aiRoutes from './modules/ai/ai.routes'
import dashboardRoutes from './modules/dashboard/dashboard.routes'
import adminRoutes from './modules/admin/admin.routes'

const app = express()

app.use(helmet())
app.use(cors({ origin: env.clientUrl, credentials: true, methods: ['GET','POST','PUT','PATCH','DELETE','OPTIONS'] }))
app.use('/api/v1/auth', authLimiter)
app.use('/api/v1/ai', aiLimiter)
app.use(globalLimiter)
app.use(morgan(env.nodeEnv === 'development' ? 'dev' : 'combined'))
app.use(express.json({ limit: '10mb' }))
app.use(express.urlencoded({ extended: true }))
app.use(cookieParser())

app.get('/health', (_, res) => res.json({ status: 'ok', timestamp: new Date().toISOString() }))

app.use('/api/v1/auth', authRoutes)
app.use('/api/v1/questions', questionsRoutes)
app.use('/api/v1/quizzes', quizzesRoutes)
app.use('/api/v1/ai', aiRoutes)
app.use('/api/v1/dashboard', dashboardRoutes)
app.use('/api/v1/admin', adminRoutes)

app.use('*', (_, res) => res.status(404).json({ success: false, message: 'Route topilmadi' }))
export default app`},

import { authController } from './auth.controller'
import { authMiddleware } from '../../middleware/auth.middleware'
import { validate } from '../../middleware/validate.middleware'
import { registerSchema, loginSchema, forgotPasswordSchema, resetPasswordSchema, changePasswordSchema, updateProfileSchema } from './auth.schema'

const router = Router()

'server/src/modules/admin/admin.routes.ts':{g:'s',i:'👑',l:'ts',n:'admin.routes.ts',d:'admin/',c:`import { Router, Response } from 'express'
import { prisma } from '../../config/database'
import { authMiddleware } from '../../middleware/auth.middleware'
import { adminMiddleware } from '../../middleware/admin.middleware'
import { successResponse, errorResponse, paginatedResponse } from '../../utils/response'
import { AuthRequest } from '../../types'

const router = Router()
router.use(authMiddleware, adminMiddleware)

// ── Users ───────────────────────────────────────────────────────────
router.get('/users', async (req: AuthRequest, res: Response) => {
  try {
    const page = parseInt(req.query.page as string)||1
    const limit = parseInt(req.query.limit as string)||20
    const skip = (page-1)*limit
    const search = req.query.search as string
    const where: any = {}
    if (search) where.OR = [
      { email: { contains: search, mode: 'insensitive' } },
      { fullName: { contains: search, mode: 'insensitive' } },
    ]
    const [users, total] = await Promise.all([
      prisma.user.findMany({
        where, skip, take: limit,
        select: { id:true, email:true, fullName:true, role:true, track:true, isVerified:true, streakCount:true, createdAt:true, _count:{ select:{ quizResults:true, aiSessions:true } } },
        orderBy: { createdAt: 'desc' },
      }),
      prisma.user.count({ where }),
    ])
    paginatedResponse(res, users, { page, limit, total })
  } catch (e: any) { errorResponse(res, e.message) }
})

router.delete('/users/:id', async (req: AuthRequest, res: Response) => {
  try {
    if (req.params.id === req.user!.userId) { errorResponse(res, "O'zingizni o'chira olmaysiz", 400); return }
    await prisma.user.delete({ where: { id: req.params.id } })
    successResponse(res, null, "Foydalanuvchi o'chirildi")
  } catch (e: any) { errorResponse(res, e.message) }
})

// ── Questions ───────────────────────────────────────────────────────
router.post('/questions', async (req: AuthRequest, res: Response) => {
  try {
    const q = await prisma.question.create({ data: { ...req.body, createdById: req.user!.userId }, include: { category: true } })
    await prisma.adminLog.create({ data: { adminId: req.user!.userId, action: 'CREATE_QUESTION', target: q.id } })
    successResponse(res, q, 'Savol yaratildi', 201)
  } catch (e: any) { errorResponse(res, e.message) }
})

router.put('/questions/:id', async (req: AuthRequest, res: Response) => {
  try {
    const q = await prisma.question.update({ where: { id: req.params.id }, data: req.body, include: { category: true } })
    successResponse(res, q, 'Savol yangilandi')
  } catch (e: any) { errorResponse(res, e.message) }
})

router.delete('/questions/:id', async (req: AuthRequest, res: Response) => {
  try {
    await prisma.question.delete({ where: { id: req.params.id } })
    successResponse(res, null, "Savol o'chirildi")
  } catch (e: any) { errorResponse(res, e.message) }
})

// ── Categories ──────────────────────────────────────────────────────
router.post('/categories', async (req: AuthRequest, res: Response) => {
  try {
    const cat = await prisma.category.create({ data: req.body })
    successResponse(res, cat, 'Kategoriya yaratildi', 201)
  } catch (e: any) { errorResponse(res, e.message) }
})

// ── Quizzes ─────────────────────────────────────────────────────────
router.post('/quizzes', async (req: AuthRequest, res: Response) => {
  try {
    const { questionIds, ...data } = req.body
    const quiz = await prisma.quiz.create({
      data: {
        ...data, createdById: req.user!.userId, questionCount: questionIds?.length||0,
        questions: questionIds ? { create: questionIds.map((qId: string, idx: number) => ({ questionId: qId, orderIndex: idx })) } : undefined,
      },
      include: { questions: true },
    })
    successResponse(res, quiz, 'Quiz yaratildi', 201)
  } catch (e: any) { errorResponse(res, e.message) }
})

// ── Analytics ───────────────────────────────────────────────────────
router.get('/analytics', async (req: AuthRequest, res: Response) => {
  try {
    const [totalUsers, totalQuestions, totalQuizzes, totalResults, avgScore, recentUsers] = await Promise.all([
      prisma.user.count(),
      prisma.question.count({ where: { isActive: true } }),
      prisma.quiz.count({ where: { isActive: true } }),
      prisma.quizResult.count(),
      prisma.quizResult.aggregate({ _avg: { percentage: true } }),
      prisma.user.findMany({ take: 5, orderBy: { createdAt: 'desc' }, select: { id:true, email:true, fullName:true, createdAt:true } }),
    ])
    successResponse(res, { totalUsers, totalQuestions, totalQuizzes, totalResults, avgScore: Math.round(avgScore._avg.percentage||0), recentUsers })
  } catch (e: any) { errorResponse(res, e.message) }
})

export default router`},

  const { id } = useParams<{ id: string }>()
  const navigate = useNavigate()
  const [started, setStarted] = useState(false)
  const [session, setSession] = useState<ISession | null>(null)
  const [cur, setCur] = useState(0)
  const [answers, setAnswers] = useState<Record<string,string>>({})
  const [timeLeft, setTimeLeft] = useState(0)
  const [t0] = useState(Date.now())

  const { data: meta, isLoading } = useQuery({
    queryKey: ['quiz', id],
    queryFn: () => quizApi.getQuiz(id!).then((r) => r.data.data),
  })
  const startMut = useMutation({
    mutationFn: () => quizApi.startQuiz(id!).then((r) => r.data.data as ISession),
    onSuccess: (d) => { setSession(d); setTimeLeft(d.timeLimit); setStarted(true) },
  })
  const submitMut = useMutation({
    mutationFn: () => quizApi.submitQuiz(id!, {
      answers: session!.questions.map((q) => ({ questionId: q.id, selectedOptionId: answers[q.id] })),
      timeSpent: Math.round((Date.now() - t0) / 1000),
    }).then((r) => r.data.data),
    onSuccess: (d) => navigate(\`/quizzes/results/\${d.id}\`),

    return () => clearInterval(t)
  }, [started])

  if (!started && meta) return (
    <div className="max-w-lg mx-auto mt-12 card animate-slide-up text-center">

        {[['Savollar', meta.questionCount], ['Vaqt', \`\${Math.round(meta.timeLimit/60)} min\`], ['Qiyinlik', meta.difficulty]].map(([l,v]) => (
          <div key={l as string} className="p-3 rounded-xl bg-slate-800 border border-slate-700">
            <div className="font-bold text-white">{v}</div>
            <div className="text-xs text-slate-400">{l}</div>
          </div>
        ))}
      </div>
      <button onClick={() => startMut.mutate()} disabled={startMut.isPending}
        className="btn-primary w-full flex items-center justify-center gap-2">
        {startMut.isPending && <Spinner size={16}/>} Quizni boshlash
      </button>
    </div>
  )

  if (!session) return <PageLoader />
  const q = session.questions[cur]
  const isLast = cur === session.questions.length - 1

  return (
    <div className="max-w-3xl mx-auto animate-slide-up">
      <div className="flex items-center justify-between mb-4">
        <span className="text-sm text-slate-400"><span className="text-white font-bold">{cur+1}</span>/{session.questions.length}</span>
        <div className={\`flex items-center gap-2 px-4 py-2 rounded-xl font-mono font-bold border \${timeLeft<60?'bg-rose-500/10 border-rose-500/20 text-rose-400':timeLeft<180?'bg-amber-500/10 border-amber-500/20 text-amber-400':'bg-accent-100 border-accent-200 text-accent-500'}\`}>
          <Clock size={16}/>
          {String(Math.floor(timeLeft/60)).padStart(2,'0')}:{String(timeLeft%60).padStart(2,'0')}
        </div>

const tracks = [

]

export default function Roadmap() {
  const [track, setTrack] = useState('FRONTEND')
  const [expanded, setExpanded] = useState<string|null>(null)
  const qc = useQueryClient()

  const { data: nodes, isLoading } = useQuery({

  })

  const completed = nodes?.filter(n=>n.isCompleted).length || 0
  const total = nodes?.length || 0
  const pct = total > 0 ? Math.round((completed/total)*100) : 0

  return (
    <div className="max-w-3xl mx-auto animate-slide-up space-y-6">
      <div>
        <h1 className="font-sans font-bold text-2xl text-white">Roadmap</h1>

        <div className="text-xs text-slate-500 mt-2">{completed} / {total} mavzu tugatildi</div>
      </div>
      {isLoading ? <PageLoader /> : (
        <div className="space-y-2">
          {(nodes||[]).map((node) => (
            <div key={node.id} className={\`card border transition-all \${node.isCompleted?'border-emerald-500/20 bg-emerald-500/5':node.isMilestone?'border-amber-500/20':'border-slate-800'}\`}>

// ════════════════════════════════════════════════════════════════
const SECS=[
  {g:'s',lbl:'⚙️ Server',clr:'#10b981'},
  {g:'c',lbl:'⚛️ Client',clr:'#00d4ff'},
  {g:'d',lbl:'📚 Docs',clr:'#a78bfa'},
]
let tabs=[],act=null

const gn=k=>F[k]?.n||k.split('/').pop()

function buildTree(q=''){
  const el=document.getElementById('tr')
  el.innerHTML=''
  SECS.forEach(sec=>{
    const keys=Object.keys(F).filter(k=>F[k].g===sec.g&&(!q||gn(k).toLowerCase().includes(q.toLowerCase())))
    if(!keys.length) return
    const g=document.createElement('div')
    const h=document.createElement('div')
    h.className='gh'
    h.innerHTML=`<span style="color:${sec.clr}">${sec.lbl}</span><span>${keys.length}</span>`
    g.appendChild(h)
    keys.forEach(key=>{
      const f=F[key]
      const d=document.createElement('div')
      d.className='fi'+(act===key?' active':'')
      d.innerHTML=`${f.i} ${f.d?`<span class="fsub">${f.d}</span>`:''}<span>${f.n}</span>`
      d.onclick=()=>open(key)
      g.appendChild(d)
    })
    el.appendChild(g)
  })
}

function srch(q){buildTree(q)}

function open(key){
  act=key
  if(!tabs.includes(key)){tabs.push(key);if(tabs.length>8)tabs.shift()}
  rTabs();rCode(key)
  buildTree(document.getElementById('sii')?.value||'')
}

function rTabs(){
  const el=document.getElementById('tb')
  el.innerHTML=''
  if(!tabs.length){el.innerHTML='<span style="padding:0 14px;font-size:10px;color:var(--tx3);display:flex;align-items:center">Fayl tanlang →</span>';return}
  tabs.forEach(key=>{
    const f=F[key]
    const d=document.createElement('div')
    d.className='tab'+(key===act?' active':'')
    d.innerHTML=`${f?.i||'📄'} ${f?.n||gn(key)}<span class="x" data-k="${key}">×</span>`
    d.onclick=e=>{if(e.target.dataset?.k)close(e.target.dataset.k);else open(key)}
    el.appendChild(d)
  })
}

function close(key){
  tabs=tabs.filter(k=>k!==key)
  if(act===key){act=tabs[tabs.length-1]||null;act?rCode(act):empty()}
  rTabs();buildTree(document.getElementById('sii')?.value||'')
}

function rCode(key){
  const f=F[key];if(!f) return
  const el=document.getElementById('ca')
  const lines=f.c.split('\n')
  const lns=lines.map((_,i)=>`<div class="ln">${i+1}</div>`).join('')
  el.innerHTML=`
    <div class="cbar">
      <span class="cp">${key}</span>
      <button class="cb" id="cb" onclick="doCopy('${key}')">📋 Nusxa</button>
    </div>
    <div class="cs">
      <div class="lns">${lns}</div>
      <div class="code">${hl(f.c,f.l)}</div>
    </div>`
  document.getElementById('sp').textContent=`${f.i} ${f.n} — ${lines.length} qator`
  document.getElementById('sl').textContent=`${f.l.toUpperCase()} · UTF-8`
}

function empty(){
  document.getElementById('ca').innerHTML='<div class="empty"><div class="empty-i">📂</div><span>Chapdan fayl tanlang</span></div>'
  document.getElementById('sp').textContent='DevPrep AI v1.0 — 37 fayl tayyor'
}

function doCopy(key){
  navigator.clipboard.writeText(F[key]?.c||'').then(()=>{
    const b=document.getElementById('cb')
    if(b){b.textContent='✅ Nusxalandi';b.classList.add('ok')}
    setTimeout(()=>{if(b){b.textContent='📋 Nusxa';b.classList.remove('ok')}},2000)
  })
}

function hl(code,lang){
  let c=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  if(lang==='prisma'){
    c=c.replace(/\/\/.*/g,'<span class="cmt">$&</span>')
       .replace(/"[^"]*"/g,'<span class="str">$&</span>')
       .replace(/\b(model|enum|generator|datasource)\b/g,'<span class="kw">$&</span>')
       .replace(/\b(String|Int|Boolean|Float|DateTime|Json)\b/g,'<span class="tp">$&</span>')
       .replace(/@[\w]+(\([^)]*\))?/g,'<span class="dc">$&</span>')
  } else if(lang==='md'){
    c=c.replace(/^(#{1,3} .+)$/gm,'<span class="cls">$1</span>')
       .replace(/`([^`]+)`/g,'<span class="tp">$1</span>')
       .replace(/^(\|.+\|)$/gm,'<span class="cmt">$1</span>')
       .replace(/^( {2}[\w.$].+)$/gm,'<span class="fn">$1</span>')
  } else {
    c=c.replace(/\/\/.*/g,'<span class="cmt">$&</span>')
       .replace(/\/\*[\s\S]*?\*\//g,'<span class="cmt">$&</span>')
       .replace(/`[^`]*`/g,m=>`<span class="str">${m}</span>`)
       .replace(/"([^"\\]|\\.)*"/g,'<span class="str">$&</span>')
       .replace(/'([^'\\]|\\.)*'/g,'<span class="str">$&</span>')
       .replace(/\b(import|export|from|default|const|let|var|function|class|interface|type|enum|return|async|await|try|catch|throw|new|if|else|for|of|in|extends|implements|null|undefined|true|false|void)\b/g,'<span class="kw">$&</span>')
       .replace(/\b(string|number|boolean|any|never|unknown)\b/g,'<span class="tp">$&</span>')
       .replace(/\b([A-Z][a-zA-Z0-9]+)\b/g,'<span class="cls">$&</span>')
       .replace(/\b(\d+)\b/g,'<span class="num">$1</span>')
  }
  return c
}

buildTree()
open('server/prisma/schema.prisma')
</script>
