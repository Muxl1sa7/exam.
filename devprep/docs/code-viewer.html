'server/prisma/schema.prisma': {g:'server',i:'🔷',l:'prisma',c:`generator client {
  provider = "prisma-client-js"
}
datasource db {
  provider  = "postgresql"
  url       = env("DATABASE_URL")
  directUrl = env("DIRECT_URL")
}

enum Role { USER  ADMIN }
enum Track { FRONTEND  BACKEND  FULLSTACK }
enum Difficulty { EASY  MEDIUM  HARD  MIXED }
enum QuestionType { MULTIPLE_CHOICE  SINGLE_CHOICE  OPEN_ENDED }
enum CategoryGroup { FRONTEND  BACKEND  GENERAL }
enum NotifType { QUIZ_RESULT  ACHIEVEMENT  ROADMAP  SYSTEM }
enum AchievementCondition { QUIZ_COUNT  SCORE  STREAK  CATEGORY }

model User {
  id            String    @id @default(uuid())
  email         String    @unique
  passwordHash  String
  fullName      String
  avatarUrl     String?
  role          Role      @default(USER)
  track         Track?
  isVerified    Boolean   @default(false)
  verifyToken   String?
  resetToken    String?
  resetTokenExp DateTime?
  refreshToken  String?
  streakCount   Int       @default(0)
  lastActive    DateTime?
  createdAt     DateTime  @default(now())
  updatedAt     DateTime  @updatedAt

  quizResults     QuizResult[]
  bookmarks       Bookmark[]
  notifications   Notification[]
  achievements    UserAchievement[]
  roadmapProgress RoadmapProgress[]
  aiSessions      AISession[]
  adminLogs       AdminLog[]
  @@map("users")
}

model Category {
  id        String        @id @default(uuid())
  name      String        @unique
  slug      String        @unique
  group     CategoryGroup
  icon      String?
  createdAt DateTime      @default(now())
  questions Question[]
  @@map("categories")
}

model Question {
  id            String       @id @default(uuid())
  categoryId    String
  category      Category     @relation(fields: [categoryId], references: [id])
  title         String
  type          QuestionType
  difficulty    Difficulty
  options       Json?        // [{id, text, isCorrect}]
  correctAnswer String?
  explanation   String?
  tags          String[]     @default([])
  isActive      Boolean      @default(true)
  createdById   String?
  createdAt     DateTime     @default(now())
  updatedAt     DateTime     @updatedAt
  quizQuestions QuizQuestion[]
  bookmarks     Bookmark[]
  @@map("questions")
}

model Quiz {
  id            String     @id @default(uuid())
  title         String
  description   String?
  type          Track
  difficulty    Difficulty
  timeLimit     Int        // seconds
  questionCount Int
  isActive      Boolean    @default(true)
  createdById   String?
  createdAt     DateTime   @default(now())
  questions     QuizQuestion[]
  results       QuizResult[]
  @@map("quizzes")
}

model QuizQuestion {
  quizId     String
  questionId String
  orderIndex Int
  quiz       Quiz     @relation(fields: [quizId], references: [id], onDelete: Cascade)
  question   Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@id([quizId, questionId])
  @@map("quiz_questions")
}

model QuizResult {
  id          String   @id @default(uuid())
  userId      String
  quizId      String
  score       Int
  total       Int
  percentage  Float
  timeSpent   Int
  answers     Json
  completedAt DateTime @default(now())
  user        User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  quiz        Quiz     @relation(fields: [quizId], references: [id], onDelete: Cascade)
  @@map("quiz_results")
}

model Bookmark {
  id         String   @id @default(uuid())
  userId     String
  questionId String
  createdAt  DateTime @default(now())
  user       User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  question   Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@unique([userId, questionId])
  @@map("bookmarks")
}

model RoadmapNode {
  id          String  @id @default(uuid())
  track       Track
  title       String
  description String?
  orderIndex  Int
  parentId    String?
  resources   Json?
  isMilestone Boolean @default(false)
  parent      RoadmapNode?  @relation("NodeChildren", fields: [parentId], references: [id])
  children    RoadmapNode[] @relation("NodeChildren")
  progress    RoadmapProgress[]
  @@map("roadmap_nodes")
}

model RoadmapProgress {
  userId      String
  nodeId      String
  isCompleted Boolean   @default(false)
  completedAt DateTime?
  user        User        @relation(fields: [userId], references: [id], onDelete: Cascade)
  node        RoadmapNode @relation(fields: [nodeId], references: [id], onDelete: Cascade)
  @@id([userId, nodeId])
  @@map("roadmap_progress")
}

model AISession {
  id           String   @id @default(uuid())
  userId       String
  questionText String
  userAnswer   String
  aiScore      Int
  aiFeedback   String
  idealAnswer  String
  resources    Json?
  createdAt    DateTime @default(now())
  user         User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("ai_sessions")
}

model Achievement {
  id             String               @id @default(uuid())
  slug           String               @unique
  title          String
  description    String?
  icon           String?
  conditionType  AchievementCondition
  conditionValue Int
  userAchievements UserAchievement[]
  @@map("achievements")
}

model UserAchievement {
  userId        String
  achievementId String
  earnedAt      DateTime    @default(now())
  user          User        @relation(fields: [userId], references: [id], onDelete: Cascade)
  achievement   Achievement @relation(fields: [achievementId], references: [id], onDelete: Cascade)
  @@id([userId, achievementId])
  @@map("user_achievements")
}

model Notification {
  id        String    @id @default(uuid())
  userId    String
  type      NotifType
  title     String
  message   String?
  isRead    Boolean   @default(false)
  createdAt DateTime  @default(now())
  user      User      @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("notifications")
}

model AdminLog {
  id        String   @id @default(uuid())
  adminId   String
  action    String
  target    String?
  details   Json?
  createdAt DateTime @default(now())
  admin     User     @relation(fields: [adminId], references: [id], onDelete: Cascade)
  @@map("admin_logs")
}`},

'server/src/app.ts': {g:'server',i:'📄',l:'ts',c:`import express from 'express'
import cors from 'cors'
import helmet from 'helmet'
import morgan from 'morgan'
import cookieParser from 'cookie-parser'
import { env } from './config/env'
import { globalLimiter, authLimiter, aiLimiter } from './middleware/rateLimit'
import authRoutes from './modules/auth/auth.routes'
import questionsRoutes from './modules/questions/questions.routes'
import quizzesRoutes from './modules/quizzes/quizzes.routes'
import aiRoutes from './modules/ai/ai.routes'
import dashboardRoutes from './modules/dashboard/dashboard.routes'
import adminRoutes from './modules/admin/admin.routes'

const app = express()

app.use(helmet())
app.use(cors({
  origin: env.clientUrl,
  credentials: true,
  methods: ['GET','POST','PUT','PATCH','DELETE','OPTIONS'],
  allowedHeaders: ['Content-Type','Authorization'],
}))
app.use('/api/v1/auth', authLimiter)
app.use('/api/v1/ai', aiLimiter)
app.use(globalLimiter)
app.use(morgan(env.nodeEnv === 'development' ? 'dev' : 'combined'))
app.use(express.json({ limit: '10mb' }))
app.use(express.urlencoded({ extended: true }))
app.use(cookieParser())

app.get('/health', (_, res) => {
  res.json({ status: 'ok', timestamp: new Date().toISOString(), service: 'DevPrep AI API' })
})

app.use('/api/v1/auth', authRoutes)
app.use('/api/v1/questions', questionsRoutes)
app.use('/api/v1/quizzes', quizzesRoutes)
app.use('/api/v1/ai', aiRoutes)
app.use('/api/v1/dashboard', dashboardRoutes)
app.use('/api/v1/admin', adminRoutes)

app.use('*', (_, res) => res.status(404).json({ success: false, message: 'Route topilmadi' }))
app.use((err: Error, _req: express.Request, res: express.Response, _n: express.NextFunction) => {
  console.error(err)
  res.status(500).json({ success: false, message: 'Server xatosi' })
})
export default app`},

'server/src/utils/jwt.ts': {g:'server',i:'🔑',l:'ts',c:`import jwt from 'jsonwebtoken'
import { env } from '../config/env'

export interface JwtPayload {
  userId: string
  email: string
  role: string
}

export const generateAccessToken = (payload: JwtPayload): string =>
  jwt.sign(payload, env.jwt.secret, { expiresIn: env.jwt.expiresIn } as jwt.SignOptions)

export const generateRefreshToken = (payload: JwtPayload): string =>
  jwt.sign(payload, env.jwt.refreshSecret, { expiresIn: env.jwt.refreshExpiresIn } as jwt.SignOptions)

export const verifyAccessToken = (token: string): JwtPayload =>
  jwt.verify(token, env.jwt.secret) as JwtPayload

export const verifyRefreshToken = (token: string): JwtPayload =>
  jwt.verify(token, env.jwt.refreshSecret) as JwtPayload`},

'server/src/middleware/auth.middleware.ts': {g:'server',i:'🛡️',l:'ts',c:`import { Response, NextFunction } from 'express'
import { verifyAccessToken } from '../utils/jwt'
import { errorResponse } from '../utils/response'
import { AuthRequest } from '../types'

export const authMiddleware = (req: AuthRequest, res: Response, next: NextFunction): void => {
  try {
    const authHeader = req.headers.authorization
    if (!authHeader?.startsWith('Bearer ')) {
      errorResponse(res, 'Token topilmadi', 401)
      return
    }
    const token = authHeader.split(' ')[1]
    const payload = verifyAccessToken(token)
    req.user = payload
    next()
  } catch {
    errorResponse(res, "Token noto'g'ri yoki muddati o'tgan", 401)
  }
}`},

'server/src/modules/auth/auth.service.ts': {g:'server',i:'🔐',l:'ts',c:`import crypto from 'crypto'
import { prisma } from '../../config/database'
import { hashPassword, comparePassword } from '../../utils/password'
import { generateAccessToken, generateRefreshToken, verifyRefreshToken } from '../../utils/jwt'
import { sendVerificationEmail, sendPasswordResetEmail } from '../../config/email'
import { RegisterDto, LoginDto, ForgotPasswordDto, ResetPasswordDto, ChangePasswordDto, UpdateProfileDto } from './auth.schema'

export class AuthService {

  async register(dto: RegisterDto) {
    const existing = await prisma.user.findUnique({ where: { email: dto.email } })
    if (existing) throw new Error("Bu email allaqachon ro'yxatdan o'tgan")

    const passwordHash = await hashPassword(dto.password)
    const verifyToken = crypto.randomBytes(32).toString('hex')

    const user = await prisma.user.create({
      data: { email: dto.email, passwordHash, fullName: dto.fullName, track: dto.track, verifyToken },
      select: { id: true, email: true, fullName: true, role: true, track: true, isVerified: true, createdAt: true },
    })

    await sendVerificationEmail(dto.email, verifyToken)
    return { user, message: "Ro'yxatdan o'tdingiz! Email manzilingizni tasdiqlang." }
  }

  async login(dto: LoginDto) {
    const user = await prisma.user.findUnique({ where: { email: dto.email } })
    if (!user) throw new Error("Email yoki parol noto'g'ri")

    const isValid = await comparePassword(dto.password, user.passwordHash)
    if (!isValid) throw new Error("Email yoki parol noto'g'ri")
    if (!user.isVerified) throw new Error('Email manzilingiz tasdiqlanmagan')

    const payload = { userId: user.id, email: user.email, role: user.role }
    const accessToken = generateAccessToken(payload)
    const refreshToken = generateRefreshToken(payload)

    // Streak logic
    const today = new Date(); today.setHours(0,0,0,0)
    const lastActive = user.lastActive ? new Date(user.lastActive) : null
    let streakCount = user.streakCount
    if (lastActive) {
      const last = new Date(lastActive); last.setHours(0,0,0,0)
      const diff = Math.floor((today.getTime() - last.getTime()) / 86400000)
      if (diff === 1) streakCount++
      else if (diff > 1) streakCount = 1
    } else {
      streakCount = 1
    }

    await prisma.user.update({
      where: { id: user.id },
      data: { refreshToken, lastActive: new Date(), streakCount },
    })

    const { passwordHash, verifyToken, resetToken, resetTokenExp, refreshToken: _rt, ...safeUser } = user
    return { accessToken, refreshToken, user: { ...safeUser, streakCount } }
  }

  async logout(userId: string) {
    await prisma.user.update({ where: { id: userId }, data: { refreshToken: null } })
  }

  async refreshTokens(token: string) {
    let payload: { userId: string; email: string; role: string }
    try { payload = verifyRefreshToken(token) }
    catch { throw new Error("Refresh token noto'g'ri yoki muddati o'tgan") }

    const user = await prisma.user.findFirst({ where: { id: payload.userId, refreshToken: token } })
    if (!user) throw new Error('Refresh token topilmadi')

    const newPayload = { userId: user.id, email: user.email, role: user.role }
    const accessToken = generateAccessToken(newPayload)
    const refreshToken = generateRefreshToken(newPayload)

    await prisma.user.update({ where: { id: user.id }, data: { refreshToken } })
    return { accessToken, refreshToken }
  }

  async verifyEmail(token: string) {
    const user = await prisma.user.findFirst({ where: { verifyToken: token } })
    if (!user) throw new Error("Noto'g'ri yoki muddati o'tgan token")
    await prisma.user.update({ where: { id: user.id }, data: { isVerified: true, verifyToken: null } })
  }

  async forgotPassword(dto: ForgotPasswordDto) {
    const user = await prisma.user.findUnique({ where: { email: dto.email } })
    if (!user) return // security: always return success
    const resetToken = crypto.randomBytes(32).toString('hex')
    const resetTokenExp = new Date(Date.now() + 3600000)
    await prisma.user.update({ where: { id: user.id }, data: { resetToken, resetTokenExp } })
    await sendPasswordResetEmail(dto.email, resetToken)
  }

  async resetPassword(dto: ResetPasswordDto) {
    const user = await prisma.user.findFirst({
      where: { resetToken: dto.token, resetTokenExp: { gt: new Date() } }
    })
    if (!user) throw new Error("Token noto'g'ri yoki muddati o'tgan")
    const passwordHash = await hashPassword(dto.password)
    await prisma.user.update({ where: { id: user.id }, data: { passwordHash, resetToken: null, resetTokenExp: null } })
  }

  async getProfile(userId: string) {
    const user = await prisma.user.findUnique({
      where: { id: userId },
      select: {
        id: true, email: true, fullName: true, avatarUrl: true,
        role: true, track: true, isVerified: true, streakCount: true,
        lastActive: true, createdAt: true,
        _count: { select: { quizResults: true, bookmarks: true, aiSessions: true } }
      }
    })
    if (!user) throw new Error('Foydalanuvchi topilmadi')
    return user
  }
}`},

'server/src/modules/quizzes/quizzes.service.ts': {g:'server',i:'📝',l:'ts',c:`import { prisma } from '../../config/database'
import { Track, Difficulty } from '@prisma/client'

export class QuizzesService {
  async getQuizzes(params: { type?: string; difficulty?: string; page?: number; limit?: number }) {
    const { type, difficulty, page = 1, limit = 10 } = params
    const skip = (page - 1) * limit
    const where: any = { isActive: true }
    if (type) where.type = type as Track
    if (difficulty) where.difficulty = difficulty as Difficulty

    const [quizzes, total] = await Promise.all([
      prisma.quiz.findMany({
        where, skip, take: limit,
        include: { _count: { select: { results: true } } },
        orderBy: { createdAt: 'desc' },
      }),
      prisma.quiz.count({ where }),
    ])
    return { quizzes, total, page, limit }
  }

  async startQuiz(id: string) {
    const quiz = await prisma.quiz.findFirst({
      where: { id, isActive: true },
      include: {
        questions: {
          include: {
            question: {
              select: {
                id: true, title: true, type: true, difficulty: true, options: true,
                category: { select: { name: true } },
                // ⚠️ correctAnswer intentionally excluded for security
              },
            },
          },
          orderBy: { orderIndex: 'asc' },
        },
      },
    })
    if (!quiz) throw new Error('Quiz topilmadi')
    return {
      id: quiz.id, title: quiz.title, description: quiz.description,
      type: quiz.type, difficulty: quiz.difficulty, timeLimit: quiz.timeLimit,
      questions: quiz.questions.map((qq) => qq.question),
    }
  }

  async submitQuiz(quizId: string, userId: string, dto: { answers: any[]; timeSpent: number }) {
    const quiz = await prisma.quiz.findFirst({
      where: { id: quizId, isActive: true },
      include: { questions: { include: { question: true }, orderBy: { orderIndex: 'asc' } } },
    })
    if (!quiz) throw new Error('Quiz topilmadi')

    let score = 0
    const detailedAnswers = dto.answers.map((ans) => {
      const qq = quiz.questions.find((q) => q.questionId === ans.questionId)
      if (!qq) return { ...ans, isCorrect: false }

      const question = qq.question
      let isCorrect = false

      if (question.type !== 'OPEN_ENDED' && question.options && ans.selectedOptionId) {
        const options = question.options as Array<{ id: string; isCorrect: boolean }>
        isCorrect = options.find((o) => o.id === ans.selectedOptionId)?.isCorrect || false
      }

      if (isCorrect) score++
      return {
        questionId: ans.questionId,
        questionTitle: question.title,
        selectedOptionId: ans.selectedOptionId,
        isCorrect,
        correctAnswer: question.correctAnswer,
        correctOptionId: (question.options as any[])?.find((o) => o.isCorrect)?.id,
        explanation: question.explanation,
      }
    })

    const total = quiz.questions.length
    const percentage = total > 0 ? (score / total) * 100 : 0

    const result = await prisma.quizResult.create({
      data: { userId, quizId, score, total, percentage, timeSpent: dto.timeSpent, answers: detailedAnswers }
    })

    await this.checkAchievements(userId)
    return { ...result, detailedAnswers }
  }

  async getLeaderboard() {
    const results = await prisma.quizResult.groupBy({
      by: ['userId'],
      _avg: { percentage: true },
      _count: { id: true },
      _max: { percentage: true },
      orderBy: { _avg: { percentage: 'desc' } },
      take: 50,
    })
    const users = await prisma.user.findMany({
      where: { id: { in: results.map((r) => r.userId) } },
      select: { id: true, fullName: true, avatarUrl: true, track: true },
    })
    return results.map((r, i) => ({
      rank: i + 1,
      user: users.find((u) => u.id === r.userId),
      avgScore: Math.round(r._avg.percentage || 0),
      totalQuizzes: r._count.id,
      bestScore: Math.round(r._max.percentage || 0),
    }))
  }

  private async checkAchievements(userId: string) {
    try {
      const quizCount = await prisma.quizResult.count({ where: { userId } })
      const achievements = await prisma.achievement.findMany({ where: { conditionType: 'QUIZ_COUNT' } })
      for (const ach of achievements) {
        if (quizCount >= ach.conditionValue) {
          await prisma.userAchievement.upsert({
            where: { userId_achievementId: { userId, achievementId: ach.id } },
            update: {},
            create: { userId, achievementId: ach.id },
          }).then(async (r) => {
            if (r) {
              await prisma.notification.create({
                data: { userId, type: 'ACHIEVEMENT', title: \`🏆 \${ach.title}\`, message: ach.description || '' }
              })
            }
          }).catch(() => {})
        }
      }
    } catch {}
  }
}
export const quizzesService = new QuizzesService()`},

const anthropic = new Anthropic({ apiKey: env.anthropic.apiKey })

export class AIService {
  async evaluateAnswer(userId: string, dto: { questionText: string; userAnswer: string; category?: string }) {
    const prompt = \`You are a senior software engineer conducting a technical interview.
Evaluate the answer and respond ONLY with valid JSON (no markdown).

Question: \${dto.questionText}
\${dto.category ? \`Category: \${dto.category}\` : ''}

{

  "resources": [{"title":"...","url":"...","type":"article|video|docs"}],
  "keyPoints": ["concept1", "concept2"]
}\`

    const response = await anthropic.messages.create({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    })

    const text = (response.content[0] as any).text
    const parsed = JSON.parse(text.replace(/\`\`\`json|\`\`\`/g, '').trim())

    const session = await prisma.aISession.create({
      data: {
        userId,
        questionText: dto.questionText,
        userAnswer: dto.userAnswer,
        aiScore: parsed.score,
        aiFeedback: parsed.feedback,
        idealAnswer: parsed.idealAnswer,
        resources: parsed.resources || [],
      }
    })

    return { sessionId: session.id, ...parsed }
  }

    let categoryFilter: any = {}
    if (dto.track === 'FRONTEND') categoryFilter = { category: { group: 'FRONTEND' } }
    else if (dto.track === 'BACKEND') categoryFilter = { category: { group: 'BACKEND' } }

    const questions = await prisma.question.findMany({
      where: { isActive: true, type: 'OPEN_ENDED', ...categoryFilter },
      include: { category: { select: { name: true, slug: true } } },
      take: count * 3,
    })

      id: q.id, title: q.title, difficulty: q.difficulty, category: q.category,
    }))
  }
}

'server/src/modules/dashboard/dashboard.service.ts': {g:'server',i:'📊',l:'ts',c:`import { prisma } from '../../config/database'

export class DashboardService {
  async getStats(userId: string) {
    const [user, quizResults, aiSessions, bookmarkCount, achievements, roadmapProgress] =
      await Promise.all([
        prisma.user.findUnique({ where: { id: userId }, select: { streakCount: true, track: true, fullName: true } }),
        prisma.quizResult.findMany({ where: { userId }, select: { percentage: true, completedAt: true }, orderBy: { completedAt: 'desc' } }),
        prisma.aISession.count({ where: { userId } }),
        prisma.bookmark.count({ where: { userId } }),
        prisma.userAchievement.count({ where: { userId } }),
        prisma.roadmapProgress.count({ where: { userId, isCompleted: true } }),
      ])

    const totalTests = quizResults.length
    const avgScore = totalTests > 0
      ? Math.round(quizResults.reduce((s, r) => s + r.percentage, 0) / totalTests) : 0

    const readinessScore = Math.min(100, Math.round(
      avgScore * 0.5 + Math.min(totalTests * 2, 30) + Math.min(aiSessions * 3, 20)
    ))

    const last7Days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i)); d.setHours(0,0,0,0); return d
    })

    const weeklyActivity = last7Days.map((day) => {
      const next = new Date(day); next.setDate(next.getDate() + 1)
      const dayResults = quizResults.filter((r) => r.completedAt >= day && r.completedAt < next)
      return {
        date: day.toISOString().split('T')[0],
        day: ['Yak','Du','Se','Cho','Pay','Ju','Sha'][day.getDay()],
        score: dayResults.length > 0 ? Math.round(dayResults.reduce((s, r) => s + r.percentage, 0) / dayResults.length) : 0,
        tests: dayResults.length,
      }
    })

    return { totalTests, avgScore, readinessScore, streakCount: user?.streakCount || 0,
      aiSessionsCount: aiSessions, bookmarkCount, achievementsCount: achievements,
      roadmapCompleted: roadmapProgress, weeklyActivity, track: user?.track }
  }

  async getRoadmap(track: string, userId: string) {
    const nodes = await prisma.roadmapNode.findMany({
      where: { track: track.toUpperCase() as any },
      include: { progress: { where: { userId }, select: { isCompleted: true, completedAt: true } } },
      orderBy: { orderIndex: 'asc' },
    })
    return nodes.map((n) => ({
      id: n.id, title: n.title, description: n.description,
      orderIndex: n.orderIndex, parentId: n.parentId,
      isMilestone: n.isMilestone, resources: n.resources,
      isCompleted: n.progress[0]?.isCompleted || false,
      completedAt: n.progress[0]?.completedAt || null,
    }))
  }

  async completeNode(userId: string, nodeId: string) {
    return prisma.roadmapProgress.upsert({
      where: { userId_nodeId: { userId, nodeId } },
      update: { isCompleted: true, completedAt: new Date() },
      create: { userId, nodeId, isCompleted: true, completedAt: new Date() },
    })
  }
}
export const dashboardService = new DashboardService()`},

'client/src/api/axios.ts': {g:'client',i:'📡',l:'ts',c:`import axios from 'axios'

const BASE_URL = import.meta.env.VITE_API_URL || '/api/v1'

export const api = axios.create({
  baseURL: BASE_URL,
  withCredentials: true,
  headers: { 'Content-Type': 'application/json' },
})

api.interceptors.request.use((config) => {
  const token = localStorage.getItem('accessToken')
  if (token) config.headers.Authorization = \`Bearer \${token}\`
  return config
})

let isRefreshing = false
let failedQueue: Array<{ resolve: (v: string) => void; reject: (e: unknown) => void }> = []

const processQueue = (error: unknown, token: string | null = null) => {
  failedQueue.forEach((p) => (error ? p.reject(error) : p.resolve(token!)))
  failedQueue = []
}

api.interceptors.response.use(
  (res) => res,
  async (error) => {
    const original = error.config
    if (error.response?.status === 401 && !original._retry) {
      if (isRefreshing) {
        return new Promise((resolve, reject) => failedQueue.push({ resolve, reject }))
          .then((token) => { original.headers.Authorization = \`Bearer \${token}\`; return api(original) })
      }
      original._retry = true
      isRefreshing = true
      try {
        const res = await axios.post(\`\${BASE_URL}/auth/refresh\`, {}, { withCredentials: true })
        const { accessToken } = res.data.data
        localStorage.setItem('accessToken', accessToken)
        processQueue(null, accessToken)
        return api(original)
      } catch (e) {
        processQueue(e, null)
        localStorage.removeItem('accessToken')
        window.location.href = '/login'
        return Promise.reject(e)
      } finally {
        isRefreshing = false
      }
    }
    return Promise.reject(error)
  }
)
export default api`},

'client/src/pages/QuizSession.tsx': {g:'client',i:'⏱️',l:'tsx',c:`import { useState, useEffect } from 'react'
import { useParams, useNavigate } from 'react-router-dom'
import { useQuery, useMutation } from '@tanstack/react-query'
import { Clock, ChevronLeft, ChevronRight, Send, AlertCircle } from 'lucide-react'
import { quizApi } from '../api/quiz.api'
import { PageLoader, Badge, Spinner } from '../components/ui'
import type { QuizSession as IQuizSession } from '../types'

export default function QuizSession() {
  const { id } = useParams<{ id: string }>()
  const navigate = useNavigate()
  const [started, setStarted] = useState(false)
  const [session, setSession] = useState<IQuizSession | null>(null)
  const [current, setCurrent] = useState(0)
  const [answers, setAnswers] = useState<Record<string, string>>({})
  const [timeLeft, setTimeLeft] = useState(0)
  const [startTime] = useState(Date.now())

  const { data: quizMeta, isLoading } = useQuery({
    queryKey: ['quiz', id],
    queryFn: () => quizApi.getQuiz(id!).then((r) => r.data.data),
  })

  const startMutation = useMutation({
    mutationFn: () => quizApi.startQuiz(id!).then((r) => r.data.data as IQuizSession),
    onSuccess: (data) => { setSession(data); setTimeLeft(data.timeLimit); setStarted(true) },
  })

  const submitMutation = useMutation({
    mutationFn: () => quizApi.submitQuiz(id!, {
      answers: session!.questions.map((q) => ({ questionId: q.id, selectedOptionId: answers[q.id] })),
      timeSpent: Math.round((Date.now() - startTime) / 1000),
    }).then((r) => r.data.data),
    onSuccess: (data) => navigate(\`/quizzes/results/\${data.id}\`),
  })

  useEffect(() => {
    if (!started || timeLeft <= 0) return
    const t = setInterval(() => setTimeLeft((n) => {
      if (n <= 1) { clearInterval(t); submitMutation.mutate(); return 0 }
      return n - 1
    }), 1000)
    return () => clearInterval(t)
  }, [started])

  if (isLoading) return <PageLoader />

  if (!started && quizMeta) return (
    <div className="max-w-lg mx-auto mt-12 card animate-slide-up text-center">
      <div className="text-5xl mb-4">📋</div>
      <h2 className="font-sans font-bold text-2xl text-white mb-2">{quizMeta.title}</h2>
      <div className="grid grid-cols-3 gap-3 my-6">
        {[['Savollar', quizMeta.questionCount], ['Vaqt', \`\${Math.round(quizMeta.timeLimit/60)} min\`], ['Qiyinlik', quizMeta.difficulty]].map(([l,v]) => (
          <div key={l as string} className="p-3 rounded-xl bg-slate-800 border border-slate-700">
            <div className="font-bold text-white">{v}</div>
            <div className="text-xs text-slate-400">{l}</div>
          </div>
        ))}
      </div>
      <button onClick={() => startMutation.mutate()} disabled={startMutation.isPending}
        className="btn-primary w-full flex items-center justify-center gap-2">
        {startMutation.isPending && <Spinner size={16} />} Quizni boshlash
      </button>
    </div>
  )

  if (!session) return <PageLoader />
  const q = session.questions[current]
  const isLast = current === session.questions.length - 1

  return (
    <div className="max-w-3xl mx-auto animate-slide-up">
      <div className="flex items-center justify-between mb-4">
        <span className="text-sm text-slate-400"><span className="text-white font-bold">{current+1}</span>/{session.questions.length}</span>
        <div className={\`flex items-center gap-2 px-4 py-2 rounded-xl font-mono font-bold border \${
          timeLeft < 60 ? 'bg-rose-500/10 border-rose-500/20 text-rose-400' :
          timeLeft < 180 ? 'bg-amber-500/10 border-amber-500/20 text-amber-400' :
          'bg-accent-100 border-accent-200 text-accent-500'}\`}>
          <Clock size={16} />
          {String(Math.floor(timeLeft/60)).padStart(2,'0')}:{String(timeLeft%60).padStart(2,'0')}
        </div>
        <span className="text-xs text-slate-400">{Object.keys(answers).length} javob</span>
      </div>

      <div className="h-1 bg-slate-800 rounded-full mb-4 overflow-hidden">
        <div className="h-full bg-accent-500 rounded-full transition-all" style={{ width: \`\${((current+1)/session.questions.length)*100}%\` }} />
      </div>

      <div className="card mb-3">
        <div className="flex gap-2 mb-3">
          <Badge variant={q.difficulty.toLowerCase() as any}>{q.difficulty}</Badge>
          {q.category && <span className="text-xs text-slate-500">{q.category.name}</span>}
        </div>
        <p className="text-slate-100 font-semibold leading-relaxed">{q.title}</p>
      </div>

      {q.options && (
        <div className="space-y-2 mb-4">
          {q.options.map((opt, idx) => (
            <button key={opt.id} onClick={() => setAnswers({ ...answers, [q.id]: opt.id })}
              className={\`w-full p-3.5 rounded-xl text-left text-sm border transition-all \${
                answers[q.id] === opt.id
                  ? 'bg-accent-100 border-accent-200 text-accent-500 font-semibold'
                  : 'bg-slate-800/50 border-slate-700 text-slate-300 hover:border-slate-600'}\`}>
              <span className="mr-3 inline-flex w-6 h-6 items-center justify-center rounded-full bg-slate-700 text-xs font-bold">
                {String.fromCharCode(65+idx)}
              </span>
              {opt.text}
            </button>
          ))}
        </div>
      )}

      <div className="flex items-center justify-between">
        <button onClick={() => setCurrent((c) => Math.max(0,c-1))} disabled={current===0}
          className="btn-secondary flex items-center gap-1 disabled:opacity-40">
          <ChevronLeft size={15}/> Oldingi
        </button>
        <div className="flex gap-1 flex-wrap justify-center max-w-xs">
          {session.questions.map((sq, i) => (
            <button key={sq.id} onClick={() => setCurrent(i)}
              className={\`w-7 h-7 rounded-lg text-xs font-bold transition-all \${
                i===current ? 'bg-accent-500 text-dark-900' :
                answers[sq.id] ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' :
                'bg-slate-800 text-slate-500 hover:bg-slate-700'}\`}
            >{i+1}</button>
          ))}
        </div>
        {isLast ? (
          <button onClick={() => submitMutation.mutate()} disabled={submitMutation.isPending}
            className="btn-primary flex items-center gap-1">
            {submitMutation.isPending ? <Spinner size={14}/> : <Send size={14}/>} Yuborish
          </button>
        ) : (
          <button onClick={() => setCurrent((c) => Math.min(session.questions.length-1,c+1))}
            className="btn-secondary flex items-center gap-1">
            Keyingi <ChevronRight size={15}/>
          </button>
        )}
      </div>
      {isLast && Object.keys(answers).length < session.questions.length && (
        <div className="mt-3 flex items-center gap-2 text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 rounded-lg p-3">
          <AlertCircle size={13}/> {session.questions.length - Object.keys(answers).length} ta savol javobsiz
        </div>
      )}
    </div>
  )
}`},

'client/src/pages/Roadmap.tsx': {g:'client',i:'🗺️',l:'tsx',c:`import { useState } from 'react'
import { useQuery, useMutation, useQueryClient } from '@tanstack/react-query'
import { CheckCircle, Circle, Award, ChevronDown, ChevronRight } from 'lucide-react'
import { dashboardApi } from '../api/dashboard.api'
import { PageLoader } from '../components/ui'
import type { RoadmapNode } from '../types'

const tracks = [
  { value: 'FRONTEND', label: '🎨 Frontend' },
  { value: 'BACKEND', label: '⚙️ Backend' },
  { value: 'FULLSTACK', label: '🚀 Full Stack' },
]

export default function Roadmap() {
  const [track, setTrack] = useState('FRONTEND')
  const [expanded, setExpanded] = useState<string | null>(null)
  const qc = useQueryClient()

  const { data: nodes, isLoading } = useQuery({
    queryKey: ['roadmap', track],
    queryFn: () => dashboardApi.getRoadmap(track).then((r) => r.data.data as RoadmapNode[]),
  })

  const completeMutation = useMutation({
    mutationFn: (nodeId: string) => dashboardApi.completeNode(nodeId),
    onSuccess: () => qc.invalidateQueries({ queryKey: ['roadmap', track] }),
  })

  const completed = nodes?.filter((n) => n.isCompleted).length || 0
  const total = nodes?.length || 0
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0

  return (
    <div className="max-w-3xl mx-auto animate-slide-up space-y-6">
      <div>
        <h1 className="font-sans font-bold text-2xl text-white">Roadmap</h1>
        <p className="text-slate-400 text-sm mt-1">O'rganish yo'lini kuzating</p>
      </div>

      <div className="flex gap-2">
        {tracks.map((t) => (
          <button key={t.value} onClick={() => setTrack(t.value)}
            className={\`px-4 py-2 rounded-xl text-sm font-semibold border transition-all \${
              track === t.value ? 'bg-accent-100 border-accent-200 text-accent-500'
              : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-600'}\`}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="card">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-semibold text-slate-300">Umumiy progress</span>
          <span className="text-sm font-bold text-accent-500">{pct}%</span>
        </div>
        <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
          <div className="h-full bg-accent-500 rounded-full transition-all duration-500" style={{ width: \`\${pct}%\` }} />
        </div>
        <div className="text-xs text-slate-500 mt-2">{completed} / {total} mavzu tugatildi</div>
      </div>

      {isLoading ? <PageLoader /> : (
        <div className="space-y-2">
          {(nodes || []).map((node) => (
            <div key={node.id} className={\`card border transition-all \${
              node.isCompleted ? 'border-emerald-500/20 bg-emerald-500/5' :
              node.isMilestone ? 'border-amber-500/20' : 'border-slate-800'}\`}>
              <div className="flex items-center gap-4 cursor-pointer"
                onClick={() => setExpanded(expanded === node.id ? null : node.id)}>
                <button onClick={(e) => { e.stopPropagation(); if (!node.isCompleted) completeMutation.mutate(node.id) }} className="shrink-0">
                  {node.isCompleted ? <CheckCircle size={22} className="text-emerald-400" /> : <Circle size={22} className="text-slate-600 hover:text-accent-500 transition-colors" />}
                </button>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-slate-500 font-mono">{String(node.orderIndex).padStart(2,'0')}.</span>
                    {node.isMilestone && <Award size={13} className="text-amber-400" />}
                    <span className={\`text-sm font-semibold \${node.isCompleted ? 'text-emerald-300 line-through opacity-60' : 'text-white'}\`}>{node.title}</span>
                    {node.isMilestone && <span className="text-xs text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20">Milestone</span>}
                  </div>
                </div>
                {expanded === node.id ? <ChevronDown size={15} className="text-slate-500" /> : <ChevronRight size={15} className="text-slate-500" />}
              </div>
              {expanded === node.id && (
                <div className="mt-3 ml-[46px] animate-slide-up space-y-2">
                  {node.description && <p className="text-sm text-slate-400 leading-relaxed">{node.description}</p>}
                  {!node.isCompleted && (
                    <button onClick={() => completeMutation.mutate(node.id)}
                      className="text-xs text-emerald-400 border border-emerald-500/20 px-3 py-1.5 rounded-lg hover:border-emerald-500/40 transition-all">
                      ✓ Tugatildi deb belgilash
                    </button>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  )
}`},

    </div>

'client/src/components/ui/index.tsx': {g:'client',i:'🧩',l:'tsx',c:`import { Loader2 } from 'lucide-react'

export function Spinner({ size = 20 }: { size?: number }) {
  return <Loader2 size={size} className="animate-spin text-accent-500" />
}

export function PageLoader() {
  return <div className="flex items-center justify-center h-64"><Spinner size={32} /></div>
}

type BadgeVariant = 'easy' | 'medium' | 'hard' | 'frontend' | 'backend' | 'general' | 'default'
export function Badge({ children, variant = 'default' }: { children: React.ReactNode; variant?: BadgeVariant }) {
  const cls: Record<BadgeVariant, string> = {
    easy: 'badge-easy', medium: 'badge-medium', hard: 'badge-hard',
    frontend: 'badge-frontend', backend: 'badge-backend', general: 'badge-general',
    default: 'bg-slate-800 text-slate-300 border border-slate-700',
  }
  return <span className={\`badge \${cls[variant]}\`}>{children}</span>
}

export function EmptyState({ icon, title, desc }: { icon: string; title: string; desc?: string }) {
  return (
    <div className="flex flex-col items-center justify-center py-16 text-center">
      <div className="text-5xl mb-4">{icon}</div>
      <h3 className="font-semibold text-slate-300 mb-1">{title}</h3>
      {desc && <p className="text-sm text-slate-500">{desc}</p>}
    </div>
  )
}

export function Modal({ isOpen, onClose, title, children }: {
  isOpen: boolean; onClose: () => void; title: string; children: React.ReactNode
}) {
  if (!isOpen) return null
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
      <div className="relative z-10 bg-dark-800 border border-slate-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-slide-up">
        <div className="flex items-center justify-between p-6 border-b border-slate-800">
          <h2 className="font-sans font-bold text-white">{title}</h2>
          <button onClick={onClose} className="text-slate-500 hover:text-white text-xl">&times;</button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  )
}

export function ScoreRing({ score, size = 80, label }: { score: number; size?: number; label?: string }) {
  const r = (size - 12) / 2
  const circ = 2 * Math.PI * r
  const offset = circ - (score / 100) * circ
  const color = score >= 70 ? '#10b981' : score >= 40 ? '#f59e0b' : '#ef4444'
  return (
    <div className="flex flex-col items-center gap-1">
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e2d4a" strokeWidth={6} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset 1s ease' }} />
      </svg>
      <div className="text-center -mt-12 mb-6">
        <div className="font-bold text-xl text-white">{score}%</div>
        {label && <div className="text-xs text-slate-400">{label}</div>}
      </div>
    </div>
  )
}

export function Alert({ type, message }: { type: 'error' | 'success' | 'info'; message: string }) {
  const s = { error:'bg-rose-500/10 border-rose-500/20 text-rose-400', success:'bg-emerald-500/10 border-emerald-500/20 text-emerald-400', info:'bg-accent-100 border-accent-200 text-accent-500' }
  return <div className={\`border rounded-lg px-4 py-3 text-sm font-mono \${s[type]}\`}>{message}</div>
}`},

'docs/API.md': {g:'docs',i:'📡',l:'md',c:`# API Hujjatlar

Base URL: https://devprep-api.onrender.com/api/v1

Header: Authorization: Bearer <accessToken>

## Auth
POST   /auth/register           → Ro'yxatdan o'tish
POST   /auth/login              → Kirish
POST   /auth/logout             → Chiqish 🔒
POST   /auth/refresh            → Token yangilash
GET    /auth/verify-email?token → Email tasdiqlash
POST   /auth/forgot-password    → Reset yuborish
POST   /auth/reset-password     → Parol yangilash
GET    /auth/me                 → Profil 🔒
PUT    /auth/profile            → Profilni yangilash 🔒
PUT    /auth/change-password    → Parol o'zgartirish 🔒

## Questions 🔒
GET  /questions                 → Ro'yxat (?search=&categoryId=&difficulty=)

//  TREE CONFIG
// ══════════════════════════════════════════════════════════════════════════
const SECTIONS = [
  { key:'server', label:'⚙️ Server', color:'#10b981', files:[
    'server/prisma/schema.prisma',
    'server/src/app.ts',
    'server/src/config/env.ts',
    'server/src/utils/jwt.ts',
    'server/src/middleware/auth.middleware.ts',
    'server/src/modules/auth/auth.service.ts',
    'server/src/modules/quizzes/quizzes.service.ts',
    'server/src/modules/ai/ai.service.ts',
    'server/src/modules/dashboard/dashboard.service.ts',
  ]},
  { key:'client', label:'⚛️ Client', color:'#00d4ff', files:[
    'client/src/main.tsx',
    'client/src/api/axios.ts',
    'client/src/store/authStore.ts',
    'client/src/components/layout/Sidebar.tsx',
    'client/src/components/ui/index.tsx',
    'client/src/pages/auth/Login.tsx',
    'client/src/pages/Dashboard.tsx',
    'client/src/pages/QuizSession.tsx',
    'client/src/pages/QuizResult.tsx',
    'client/src/pages/Roadmap.tsx',
  ]},
  { key:'docs', label:'📚 Docs', color:'#a78bfa', files:[
    'docs/DEPLOY.md',
    'docs/LOCAL_SETUP.md',
    'docs/API.md',
  ]},
]

// ── STATE ────────────────────────────────────────────────────────────────
let openTabs = []
let activeKey = null

function getLabel(key) { return key.split('/').pop() }

// ── BUILD TREE ───────────────────────────────────────────────────────────
function buildTree(filter='') {
  const el = document.getElementById('treeEl')
  el.innerHTML = ''
  SECTIONS.forEach(sec => {
    const items = sec.files.filter(k => !filter || getLabel(k).toLowerCase().includes(filter.toLowerCase()))
    if (!items.length) return
    const wrap = document.createElement('div')
    wrap.className = 'tree-section'
    const hdr = document.createElement('div')
    hdr.className = 'tree-sec-hdr'
    hdr.innerHTML = `<span style="color:${sec.color}">${sec.label}</span> <span style="font-size:9px;opacity:.5">${items.length} fayl</span>`
    wrap.appendChild(hdr)
    items.forEach(key => {
      const f = FILES[key]
      if (!f) return
      const item = document.createElement('div')
      item.className = 'tree-item' + (activeKey===key?' active':'')
      item.dataset.key = key
      const name = getLabel(key)
      const dir = key.split('/').slice(-2,-1)[0]
      const showDir = dir !== sec.key.split('/')[0] && dir !== 'src' && dir !== 'docs'
      item.innerHTML = `<span>${f.i}</span>${showDir?`<span class="sub">${dir}/</span>`:''}<span>${name}</span>`
      item.onclick = () => openFile(key)
      wrap.appendChild(item)
    })
    el.appendChild(wrap)
  })
}

function filterFiles(q) { buildTree(q) }

// ── OPEN FILE ────────────────────────────────────────────────────────────
function openFile(key) {
  activeKey = key
  if (!openTabs.includes(key)) {
    openTabs.push(key)
    if (openTabs.length > 8) openTabs.shift()
  }
  renderTabs()
  renderCode(key)
  buildTree(document.getElementById('searchInput')?.value||'')
}

// ── RENDER TABS ──────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('tabsEl')
  el.innerHTML = ''
  if (!openTabs.length) {
    el.innerHTML = '<span style="padding:0 16px;font-size:11px;color:var(--text3);display:flex;align-items:center">Fayl tanlang →</span>'
    return
  }
  openTabs.forEach(key => {
    const f = FILES[key]
    const tab = document.createElement('div')
    tab.className = 'tab' + (key===activeKey?' active':'')
    tab.innerHTML = `${f?.i||'📄'} ${getLabel(key)}<span class="tc" data-k="${key}">×</span>`
    tab.onclick = e => { if (e.target.dataset?.k) closeTab(e.target.dataset.k); else openFile(key) }
    el.appendChild(tab)
  })
}

function closeTab(key) {
  openTabs = openTabs.filter(k=>k!==key)
  if (activeKey===key) {
    activeKey = openTabs[openTabs.length-1]||null
    if (activeKey) renderCode(activeKey)
    else showEmpty()
  }
  renderTabs()
  buildTree(document.getElementById('searchInput')?.value||'')
}

// ── RENDER CODE ──────────────────────────────────────────────────────────
function renderCode(key) {
  const f = FILES[key]
  if (!f) return
  const wrap = document.getElementById('codeWrap')
  const lines = f.c.split('\n')
  const lineNums = lines.map((_,i)=>`<div class="ln">${i+1}</div>`).join('')
  const code = highlight(f.c, f.l)

  wrap.innerHTML = `
    <div class="code-topbar">
      <span class="code-path">${key}</span>
      <button class="copy-btn" id="copyBtn" onclick="copyCode('${key}')">📋 Nusxa olish</button>
    </div>
    <div class="code-body" style="flex:1;overflow:auto">
      <div class="line-nums">${lineNums}</div>
      <div class="code-text">${code}</div>
    </div>`

  document.getElementById('sbPath').textContent = `${FILES[key].i} ${key}`
  document.getElementById('sbLang').textContent = `${f.l.toUpperCase()} · UTF-8 · ${lines.length} qator`
}

function showEmpty() {
  document.getElementById('codeWrap').innerHTML = `
    <div class="empty-state">
      <div class="ei">📂</div>
      <span>Chapdan fayl tanlang</span>
    </div>`
  document.getElementById('sbPath').textContent = 'DevPrep AI v1.0 — tayyor'
}

// ── COPY ─────────────────────────────────────────────────────────────────
function copyCode(key) {
  navigator.clipboard.writeText(FILES[key]?.c||'').then(()=>{
    const btn = document.getElementById('copyBtn')
    if(btn){btn.textContent='✅ Nusxalandi';btn.classList.add('ok')}
    setTimeout(()=>{if(btn){btn.textContent='📋 Nusxa olish';btn.classList.remove('ok')}},2000)
  })
}

// ── HIGHLIGHT ────────────────────────────────────────────────────────────
function highlight(code, lang) {
  let c = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  if (lang==='json') {
    c = c
      .replace(/("[\w-]+")\s*:/g,'<span class="prop">$1</span>:')
      .replace(/:\s*(".*?")/g,': <span class="str">$1</span>')
      .replace(/:\s*(\d+\.?\d*)/g,': <span class="num">$1</span>')
      .replace(/:\s*(true|false|null)/g,': <span class="kw">$1</span>')
  } else if (lang==='prisma') {
    c = c
      .replace(/\/\/.*/g,'<span class="cmt">$&</span>')
      .replace(/"[^"]*"/g,'<span class="str">$&</span>')
      .replace(/\b(model|enum|generator|datasource)\b/g,'<span class="kw">$&</span>')
      .replace(/\b(String|Int|Boolean|Float|DateTime|Json)\b/g,'<span class="type">$&</span>')
      .replace(/@[\w]+(\(.*?\))?/g,'<span class="dec">$&</span>')
  } else if (lang==='md') {
    c = c
      .replace(/^(#{1,3} .+)$/gm,'<span class="cls">$1</span>')
      .replace(/\*\*(.*?)\*\*/g,'<span class="str">$1</span>')
      .replace(/`([^`]+)`/g,'<span class="type">$1</span>')
      .replace(/^(\|.+\|)$/gm,'<span class="cmt">$1</span>')
      .replace(/^( {2}[\w.].+)$/gm,'<span class="fn">$1</span>')
  } else {
    // TS/TSX
    c = c
      .replace(/\/\/.*/g,'<span class="cmt">$&</span>')
      .replace(/\/\*[\s\S]*?\*\//g,'<span class="cmt">$&</span>')
      .replace(/`[^`]*`/g,m=>`<span class="str">${m}</span>`)
      .replace(/"([^"\\]|\\.)*"/g,'<span class="str">$&</span>')
      .replace(/'([^'\\]|\\.)*'/g,'<span class="str">$&</span>')
      .replace(/\b(import|export|from|default|const|let|var|function|class|interface|type|enum|return|async|await|try|catch|throw|new|if|else|for|of|in|extends|implements|null|undefined|true|false)\b/g,'<span class="kw">$&</span>')
      .replace(/\b(string|number|boolean|void|any|never|unknown)\b/g,'<span class="type">$&</span>')
      .replace(/\b([A-Z][a-zA-Z]+)\b(?!\s*=)/g,'<span class="cls">$&</span>')
      .replace(/\b(\d+)\b/g,'<span class="num">$1</span>')
  }
  return c
}

// ── INIT ─────────────────────────────────────────────────────────────────
buildTree()
openFile('server/prisma/schema.prisma')
