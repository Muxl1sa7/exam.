's/prisma/schema.prisma':{g:'server',i:'🔷',l:'prisma',n:'schema.prisma',p:'prisma/',c:`generator client {
  provider = "prisma-client-js"
}
datasource db {
  provider  = "postgresql"
  url       = env("DATABASE_URL")
  directUrl = env("DIRECT_URL")
}

enum Role { USER  ADMIN }
enum Track { FRONTEND  BACKEND  FULLSTACK }
enum Difficulty { EASY  MEDIUM  HARD  MIXED }
enum QuestionType { MULTIPLE_CHOICE  SINGLE_CHOICE  OPEN_ENDED }
enum CategoryGroup { FRONTEND  BACKEND  GENERAL }
enum NotifType { QUIZ_RESULT  ACHIEVEMENT  ROADMAP  SYSTEM }
enum AchievementCondition { QUIZ_COUNT  SCORE  STREAK  CATEGORY }

model User {
  id            String    @id @default(uuid())
  email         String    @unique
  passwordHash  String
  fullName      String
  avatarUrl     String?
  role          Role      @default(USER)
  track         Track?
  isVerified    Boolean   @default(false)
  verifyToken   String?
  resetToken    String?
  resetTokenExp DateTime?
  refreshToken  String?
  streakCount   Int       @default(0)
  lastActive    DateTime?
  createdAt     DateTime  @default(now())
  updatedAt     DateTime  @updatedAt
  quizResults     QuizResult[]
  bookmarks       Bookmark[]
  notifications   Notification[]
  achievements    UserAchievement[]
  roadmapProgress RoadmapProgress[]
  aiSessions      AISession[]
  adminLogs       AdminLog[]
  @@map("users")
}

model Category {
  id        String        @id @default(uuid())
  name      String        @unique
  slug      String        @unique
  group     CategoryGroup
  icon      String?
  createdAt DateTime      @default(now())
  questions Question[]
  @@map("categories")
}

model Question {
  id            String       @id @default(uuid())
  categoryId    String
  category      Category     @relation(fields: [categoryId], references: [id])
  title         String
  type          QuestionType
  difficulty    Difficulty
  options       Json?        // [{id, text, isCorrect}]
  correctAnswer String?
  explanation   String?
  tags          String[]     @default([])
  isActive      Boolean      @default(true)
  createdById   String?
  createdAt     DateTime     @default(now())
  updatedAt     DateTime     @updatedAt
  quizQuestions QuizQuestion[]
  bookmarks     Bookmark[]
  @@map("questions")
}

model Quiz {
  id            String     @id @default(uuid())
  title         String
  description   String?
  type          Track
  difficulty    Difficulty
  timeLimit     Int
  questionCount Int
  isActive      Boolean    @default(true)
  createdById   String?
  createdAt     DateTime   @default(now())
  questions     QuizQuestion[]
  results       QuizResult[]
  @@map("quizzes")
}

model QuizQuestion {
  quizId     String
  questionId String
  orderIndex Int
  quiz       Quiz     @relation(fields: [quizId], references: [id], onDelete: Cascade)
  question   Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@id([quizId, questionId])
  @@map("quiz_questions")
}

model QuizResult {
  id          String   @id @default(uuid())
  userId      String
  quizId      String
  score       Int
  total       Int
  percentage  Float
  timeSpent   Int
  answers     Json
  completedAt DateTime @default(now())
  user        User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  quiz        Quiz     @relation(fields: [quizId], references: [id], onDelete: Cascade)
  @@map("quiz_results")
}

model Bookmark {
  id         String   @id @default(uuid())
  userId     String
  questionId String
  createdAt  DateTime @default(now())
  user       User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  question   Question @relation(fields: [questionId], references: [id], onDelete: Cascade)
  @@unique([userId, questionId])
  @@map("bookmarks")
}

model RoadmapNode {
  id          String  @id @default(uuid())
  track       Track
  title       String
  description String?
  orderIndex  Int
  parentId    String?
  resources   Json?
  isMilestone Boolean @default(false)
  parent      RoadmapNode?  @relation("NodeChildren", fields: [parentId], references: [id])
  children    RoadmapNode[] @relation("NodeChildren")
  progress    RoadmapProgress[]
  @@map("roadmap_nodes")
}

model RoadmapProgress {
  userId      String
  nodeId      String
  isCompleted Boolean   @default(false)
  completedAt DateTime?
  user        User        @relation(fields: [userId], references: [id], onDelete: Cascade)
  node        RoadmapNode @relation(fields: [nodeId], references: [id], onDelete: Cascade)
  @@id([userId, nodeId])
  @@map("roadmap_progress")
}

model AISession {
  id           String   @id @default(uuid())
  userId       String
  questionText String
  userAnswer   String
  aiScore      Int
  aiFeedback   String
  idealAnswer  String
  resources    Json?
  createdAt    DateTime @default(now())
  user         User     @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("ai_sessions")
}

model Achievement {
  id             String               @id @default(uuid())
  slug           String               @unique
  title          String
  description    String?
  icon           String?
  conditionType  AchievementCondition
  conditionValue Int
  userAchievements UserAchievement[]
  @@map("achievements")
}

model UserAchievement {
  userId        String
  achievementId String
  earnedAt      DateTime    @default(now())
  user          User        @relation(fields: [userId], references: [id], onDelete: Cascade)
  achievement   Achievement @relation(fields: [achievementId], references: [id], onDelete: Cascade)
  @@id([userId, achievementId])
  @@map("user_achievements")
}

model Notification {
  id        String    @id @default(uuid())
  userId    String
  type      NotifType
  title     String
  message   String?
  isRead    Boolean   @default(false)
  createdAt DateTime  @default(now())
  user      User      @relation(fields: [userId], references: [id], onDelete: Cascade)
  @@map("notifications")
}

model AdminLog {
  id        String   @id @default(uuid())
  adminId   String
  action    String
  target    String?
  details   Json?
  createdAt DateTime @default(now())
  admin     User     @relation(fields: [adminId], references: [id], onDelete: Cascade)
  @@map("admin_logs")
}`},

's/src/app.ts':{g:'server',i:'🚀',l:'ts',n:'app.ts',p:'src/',c:`import express from 'express'
import cors from 'cors'
import helmet from 'helmet'
import morgan from 'morgan'
import cookieParser from 'cookie-parser'
import { env } from './config/env'
import { globalLimiter, authLimiter, aiLimiter } from './middleware/rateLimit'
import authRoutes from './modules/auth/auth.routes'
import questionsRoutes from './modules/questions/questions.routes'
import quizzesRoutes from './modules/quizzes/quizzes.routes'

app.use(helmet())

's/src/utils/jwt.ts':{g:'server',i:'🔑',l:'ts',n:'jwt.ts',p:'utils/',c:`import jwt from 'jsonwebtoken'
import { env } from '../config/env'

export interface JwtPayload { userId: string; email: string; role: string }

export const generateAccessToken = (payload: JwtPayload): string =>
  jwt.sign(payload, env.jwt.secret, { expiresIn: env.jwt.expiresIn } as jwt.SignOptions)

export const generateRefreshToken = (payload: JwtPayload): string =>
  jwt.sign(payload, env.jwt.refreshSecret, { expiresIn: env.jwt.refreshExpiresIn } as jwt.SignOptions)

export const verifyAccessToken = (token: string): JwtPayload =>
  jwt.verify(token, env.jwt.secret) as JwtPayload

export const verifyRefreshToken = (token: string): JwtPayload =>
  jwt.verify(token, env.jwt.refreshSecret) as JwtPayload`},

's/src/utils/response.ts':{g:'server',i:'📤',l:'ts',n:'response.ts',p:'utils/',c:`import { Response } from 'express'

export const successResponse = (res: Response, data: unknown, message = 'Success', statusCode = 200) =>
  res.status(statusCode).json({ success: true, message, data })

export const errorResponse = (res: Response, message = 'Internal server error', statusCode = 500, errors?: unknown) =>
  res.status(statusCode).json({ success: false, message, errors: errors || null })

export const paginatedResponse = (
  res: Response,
  data: unknown,
  pagination: { page: number; limit: number; total: number },
  message = 'Success'
) => res.status(200).json({
  success: true, message, data,
  pagination: {
    page: pagination.page,
    limit: pagination.limit,
    total: pagination.total,
    totalPages: Math.ceil(pagination.total / pagination.limit),
  },
})`},

's/src/middleware/auth.ts':{g:'server',i:'🛡️',l:'ts',n:'auth.middleware.ts',p:'middleware/',c:`import { Response, NextFunction } from 'express'
import { verifyAccessToken } from '../utils/jwt'
import { errorResponse } from '../utils/response'
import { AuthRequest } from '../types'

export const authMiddleware = (req: AuthRequest, res: Response, next: NextFunction): void => {
  try {
    const authHeader = req.headers.authorization
    if (!authHeader?.startsWith('Bearer ')) {
      errorResponse(res, 'Token topilmadi', 401)
      return
    }
    const token = authHeader.split(' ')[1]
    const payload = verifyAccessToken(token)
    req.user = payload
    next()
  } catch {
    errorResponse(res, "Token noto'g'ri yoki muddati o'tgan", 401)
  }
}

export const adminMiddleware = (req: AuthRequest, res: Response, next: NextFunction): void => {
  if (!req.user || req.user.role !== 'ADMIN') {
    errorResponse(res, 'Admin huquqi talab qilinadi', 403)
    return
  }
  next()
}`},

's/src/modules/auth/auth.service.ts':{g:'server',i:'🔐',l:'ts',n:'auth.service.ts',p:'auth/',c:`import crypto from 'crypto'
import { prisma } from '../../config/database'
import { hashPassword, comparePassword } from '../../utils/password'
import { generateAccessToken, generateRefreshToken, verifyRefreshToken } from '../../utils/jwt'
import { sendVerificationEmail, sendPasswordResetEmail } from '../../config/email'

export class AuthService {
  async register(dto: { email: string; password: string; fullName: string; track?: any }) {
    const existing = await prisma.user.findUnique({ where: { email: dto.email } })
    if (existing) throw new Error("Bu email allaqachon ro'yxatdan o'tgan")

    const passwordHash = await hashPassword(dto.password)
    const verifyToken = crypto.randomBytes(32).toString('hex')

    const user = await prisma.user.create({
      data: { email: dto.email, passwordHash, fullName: dto.fullName, track: dto.track, verifyToken },
      select: { id: true, email: true, fullName: true, role: true, track: true, isVerified: true, createdAt: true },
    })
    await sendVerificationEmail(dto.email, verifyToken)
    return { user, message: "Ro'yxatdan o'tdingiz! Email manzilingizni tasdiqlang." }
  }

  async login(dto: { email: string; password: string }) {
    const user = await prisma.user.findUnique({ where: { email: dto.email } })
    if (!user) throw new Error("Email yoki parol noto'g'ri")

    const isValid = await comparePassword(dto.password, user.passwordHash)
    if (!isValid) throw new Error("Email yoki parol noto'g'ri")
    if (!user.isVerified) throw new Error('Email tasdiqlanmagan')

    const payload = { userId: user.id, email: user.email, role: user.role }
    const accessToken = generateAccessToken(payload)
    const refreshToken = generateRefreshToken(payload)

    // Streak calculation
    const today = new Date(); today.setHours(0,0,0,0)
    let streakCount = user.streakCount
    if (user.lastActive) {
      const last = new Date(user.lastActive); last.setHours(0,0,0,0)
      const diff = Math.floor((today.getTime() - last.getTime()) / 86400000)
      if (diff === 1) streakCount++
      else if (diff > 1) streakCount = 1
    } else streakCount = 1

    await prisma.user.update({
      where: { id: user.id },
      data: { refreshToken, lastActive: new Date(), streakCount },
    })
    const { passwordHash, verifyToken, resetToken, resetTokenExp, refreshToken: _r, ...safe } = user
    return { accessToken, refreshToken, user: { ...safe, streakCount } }
  }

  async logout(userId: string) {
    await prisma.user.update({ where: { id: userId }, data: { refreshToken: null } })
  }

  async refreshTokens(token: string) {
    const payload = verifyRefreshToken(token)
    const user = await prisma.user.findFirst({ where: { id: payload.userId, refreshToken: token } })
    if (!user) throw new Error('Refresh token topilmadi')
    const newPayload = { userId: user.id, email: user.email, role: user.role }
    const accessToken = generateAccessToken(newPayload)
    const refreshToken = generateRefreshToken(newPayload)
    await prisma.user.update({ where: { id: user.id }, data: { refreshToken } })
    return { accessToken, refreshToken }
  }

  async verifyEmail(token: string) {
    const user = await prisma.user.findFirst({ where: { verifyToken: token } })
    if (!user) throw new Error("Token noto'g'ri yoki muddati o'tgan")
    await prisma.user.update({ where: { id: user.id }, data: { isVerified: true, verifyToken: null } })
  }

  async forgotPassword(email: string) {
    const user = await prisma.user.findUnique({ where: { email } })
    if (!user) return
    const resetToken = crypto.randomBytes(32).toString('hex')
    await prisma.user.update({ where: { id: user.id }, data: { resetToken, resetTokenExp: new Date(Date.now() + 3600000) } })
    await sendPasswordResetEmail(email, resetToken)
  }

  async resetPassword(token: string, password: string) {
    const user = await prisma.user.findFirst({ where: { resetToken: token, resetTokenExp: { gt: new Date() } } })
    if (!user) throw new Error("Token noto'g'ri yoki muddati o'tgan")
    const passwordHash = await hashPassword(password)
    await prisma.user.update({ where: { id: user.id }, data: { passwordHash, resetToken: null, resetTokenExp: null } })
  }
}

's/src/modules/questions/questions.service.ts':{g:'server',i:'📚',l:'ts',n:'questions.service.ts',p:'questions/',c:`import { prisma } from '../../config/database'
import { Difficulty, QuestionType } from '@prisma/client'

export class QuestionsService {
  async getQuestions(params: {
    page?: number; limit?: number; categoryId?: string;
    difficulty?: string; type?: string; search?: string; userId?: string
  }) {
    const { page=1, limit=20, categoryId, difficulty, type, search, userId } = params
    const skip = (page-1)*limit
    const where: any = { isActive: true }
    if (categoryId) where.categoryId = categoryId
    if (difficulty) where.difficulty = difficulty as Difficulty
    if (type) where.type = type as QuestionType
    if (search) where.title = { contains: search, mode: 'insensitive' }

    const [questions, total] = await Promise.all([
      prisma.question.findMany({
        where, skip, take: limit,
        include: {
          category: { select: { id: true, name: true, slug: true, group: true, icon: true } },
          bookmarks: userId ? { where: { userId }, select: { id: true } } : false,
        },
        orderBy: { createdAt: 'desc' },
      }),
      prisma.question.count({ where }),
    ])

    return {
      questions: questions.map((q) => ({
        ...q, isBookmarked: userId ? q.bookmarks.length > 0 : false, bookmarks: undefined,
      })),
      total, page, limit,
    }
  }

  async getCategories() {
    const categories = await prisma.category.findMany({
      include: { _count: { select: { questions: { where: { isActive: true } } } } },
      orderBy: { name: 'asc' },
    })
    return categories.map((c) => ({ ...c, questionCount: c._count.questions }))
  }

  async toggleBookmark(userId: string, questionId: string) {
    const existing = await prisma.bookmark.findUnique({
      where: { userId_questionId: { userId, questionId } }
    })
    if (existing) {
      await prisma.bookmark.delete({ where: { id: existing.id } })
      return { bookmarked: false }
    }
    await prisma.bookmark.create({ data: { userId, questionId } })
    return { bookmarked: true }
  }
}
export const questionsService = new QuestionsService()`},

's/src/modules/quizzes/quizzes.service.ts':{g:'server',i:'📝',l:'ts',n:'quizzes.service.ts',p:'quizzes/',c:`import { prisma } from '../../config/database'
import { Track, Difficulty } from '@prisma/client'

export class QuizzesService {
  async startQuiz(id: string) {
    const quiz = await prisma.quiz.findFirst({
      where: { id, isActive: true },
      include: {
        questions: {
          include: {
            question: {
              select: {
                id: true, title: true, type: true, difficulty: true, options: true,
                category: { select: { name: true } },
                // ⚠️ correctAnswer intentionally NOT included
              },
            },
          },
          orderBy: { orderIndex: 'asc' },
        },
      },
    })
    if (!quiz) throw new Error('Quiz topilmadi')
    return {
      id: quiz.id, title: quiz.title, description: quiz.description,
      type: quiz.type, difficulty: quiz.difficulty, timeLimit: quiz.timeLimit,
      questions: quiz.questions.map((qq) => qq.question),
    }
  }

  async submitQuiz(quizId: string, userId: string, dto: { answers: any[]; timeSpent: number }) {
    const quiz = await prisma.quiz.findFirst({
      where: { id: quizId, isActive: true },
      include: { questions: { include: { question: true }, orderBy: { orderIndex: 'asc' } } },
    })
    if (!quiz) throw new Error('Quiz topilmadi')

    let score = 0
    const detailedAnswers = dto.answers.map((ans) => {
      const qq = quiz.questions.find((q) => q.questionId === ans.questionId)
      if (!qq) return { ...ans, isCorrect: false }
      const question = qq.question
      let isCorrect = false
      if (question.type !== 'OPEN_ENDED' && question.options && ans.selectedOptionId) {
        const opts = question.options as Array<{ id: string; isCorrect: boolean }>
        isCorrect = opts.find((o) => o.id === ans.selectedOptionId)?.isCorrect || false
      }
      if (isCorrect) score++
      return {
        questionId: ans.questionId, questionTitle: question.title,
        selectedOptionId: ans.selectedOptionId, isCorrect,
        correctAnswer: question.correctAnswer,
        correctOptionId: (question.options as any[])?.find((o) => o.isCorrect)?.id,
        explanation: question.explanation,
      }
    })

    const total = quiz.questions.length
    const percentage = total > 0 ? (score / total) * 100 : 0
    const result = await prisma.quizResult.create({
      data: { userId, quizId, score, total, percentage, timeSpent: dto.timeSpent, answers: detailedAnswers }
    })

    // Auto-check achievements
    await this.checkAchievements(userId)
    return { ...result, detailedAnswers }
  }

  async getLeaderboard() {
    const results = await prisma.quizResult.groupBy({
      by: ['userId'], _avg: { percentage: true }, _count: { id: true }, _max: { percentage: true },
      orderBy: { _avg: { percentage: 'desc' } }, take: 50,
    })
    const users = await prisma.user.findMany({
      where: { id: { in: results.map((r) => r.userId) } },
      select: { id: true, fullName: true, avatarUrl: true, track: true },
    })
    return results.map((r, i) => ({
      rank: i+1, user: users.find((u) => u.id === r.userId),
      avgScore: Math.round(r._avg.percentage || 0),
      totalQuizzes: r._count.id, bestScore: Math.round(r._max.percentage || 0),
    }))
  }

  private async checkAchievements(userId: string) {
    try {
      const quizCount = await prisma.quizResult.count({ where: { userId } })
      const achievements = await prisma.achievement.findMany({ where: { conditionType: 'QUIZ_COUNT' } })
      for (const ach of achievements) {
        if (quizCount >= ach.conditionValue) {
          const exists = await prisma.userAchievement.findUnique({
            where: { userId_achievementId: { userId, achievementId: ach.id } }
          })
          if (!exists) {
            await prisma.userAchievement.create({ data: { userId, achievementId: ach.id } })
            await prisma.notification.create({
              data: { userId, type: 'ACHIEVEMENT', title: \`🏆 \${ach.title}\`, message: ach.description || '' }
            })
          }
        }
      }
    } catch {}
  }
}
export const quizzesService = new QuizzesService()`},

import { prisma } from '../../config/database'
import { env } from '../../config/env'

const anthropic = new Anthropic({ apiKey: env.anthropic.apiKey })

export class AIService {
  async evaluateAnswer(userId: string, dto: {
    questionText: string; userAnswer: string; category?: string
  }) {
    const prompt = \`You are a senior software engineer conducting a technical interview.
Evaluate the answer and respond ONLY with valid JSON (no markdown).

Question: \${dto.questionText}
\${dto.category ? \`Category: \${dto.category}\` : ''}
Candidate Answer: \${dto.userAnswer}

{
  "score": <1-10>,
  "feedback": "<2-3 sentences>",
  "idealAnswer": "<comprehensive ideal answer>",
  "mistakes": ["mistake1", "mistake2"],
  "resources": [{"title":"...","url":"...","type":"article|video|docs"}],
  "keyPoints": ["concept1", "concept2"]
}\`

    const response = await anthropic.messages.create({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    })

    const text = (response.content[0] as any).text
    const parsed = JSON.parse(text.replace(/\`\`\`json|\`\`\`/g, '').trim())

    const session = await prisma.aISession.create({
      data: {
        userId, questionText: dto.questionText, userAnswer: dto.userAnswer,
        aiScore: parsed.score, aiFeedback: parsed.feedback,
        idealAnswer: parsed.idealAnswer, resources: parsed.resources || [],
      }
    })
    return { sessionId: session.id, ...parsed }
  }

  async getMockInterviewQuestions(track: string, count = 5) {
    let where: any = { isActive: true, type: 'OPEN_ENDED' }
    if (track === 'FRONTEND') where = { ...where, category: { group: 'FRONTEND' } }
    else if (track === 'BACKEND') where = { ...where, category: { group: 'BACKEND' } }

    const questions = await prisma.question.findMany({
      where, include: { category: { select: { name: true, slug: true } } }, take: count * 3,
    })
    return questions.sort(() => Math.random() - 0.5).slice(0, count).map((q) => ({
      id: q.id, title: q.title, difficulty: q.difficulty, category: q.category,
    }))
  }
}
export const aiService = new AIService()`},

's/src/modules/dashboard/dashboard.service.ts':{g:'server',i:'📊',l:'ts',n:'dashboard.service.ts',p:'dashboard/',c:`import { prisma } from '../../config/database'

export class DashboardService {
  async getStats(userId: string) {
    const [user, quizResults, aiSessions, bookmarkCount, achievements, roadmapProgress] =
      await Promise.all([
        prisma.user.findUnique({ where: { id: userId }, select: { streakCount: true, track: true } }),
        prisma.quizResult.findMany({ where: { userId }, select: { percentage: true, completedAt: true }, orderBy: { completedAt: 'desc' } }),
        prisma.aISession.count({ where: { userId } }),
        prisma.bookmark.count({ where: { userId } }),
        prisma.userAchievement.count({ where: { userId } }),
        prisma.roadmapProgress.count({ where: { userId, isCompleted: true } }),
      ])

    const totalTests = quizResults.length
    const avgScore = totalTests > 0
      ? Math.round(quizResults.reduce((s, r) => s + r.percentage, 0) / totalTests) : 0
    const readinessScore = Math.min(100, Math.round(
      avgScore * 0.5 + Math.min(totalTests * 2, 30) + Math.min(aiSessions * 3, 20)
    ))

    const last7Days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i)); d.setHours(0,0,0,0); return d
    })
    const weeklyActivity = last7Days.map((day) => {
      const next = new Date(day); next.setDate(next.getDate() + 1)
      const dr = quizResults.filter((r) => r.completedAt >= day && r.completedAt < next)
      return {
        date: day.toISOString().split('T')[0],
        day: ['Yak','Du','Se','Cho','Pay','Ju','Sha'][day.getDay()],
        score: dr.length > 0 ? Math.round(dr.reduce((s, r) => s + r.percentage, 0) / dr.length) : 0,
        tests: dr.length,
      }
    })

    return {
      totalTests, avgScore, readinessScore,
      streakCount: user?.streakCount || 0,
      aiSessionsCount: aiSessions, bookmarkCount,
      achievementsCount: achievements, roadmapCompleted: roadmapProgress,
      weeklyActivity, track: user?.track,
    }
  }

  async getRoadmap(track: string, userId: string) {
    const nodes = await prisma.roadmapNode.findMany({
      where: { track: track.toUpperCase() as any },
      include: { progress: { where: { userId }, select: { isCompleted: true, completedAt: true } } },
      orderBy: { orderIndex: 'asc' },
    })
    return nodes.map((n) => ({
      id: n.id, title: n.title, description: n.description,
      orderIndex: n.orderIndex, parentId: n.parentId,
      isMilestone: n.isMilestone, resources: n.resources,
      isCompleted: n.progress[0]?.isCompleted || false,
      completedAt: n.progress[0]?.completedAt || null,
    }))
  }

  async completeNode(userId: string, nodeId: string) {
    return prisma.roadmapProgress.upsert({
      where: { userId_nodeId: { userId, nodeId } },
      update: { isCompleted: true, completedAt: new Date() },
      create: { userId, nodeId, isCompleted: true, completedAt: new Date() },
    })
  }

  async getAchievements(userId: string) {
    const [all, earned] = await Promise.all([
      prisma.achievement.findMany({ orderBy: { conditionValue: 'asc' } }),
      prisma.userAchievement.findMany({ where: { userId }, include: { achievement: true } }),
    ])
    return all.map((ach) => {
      const ua = earned.find((e) => e.achievementId === ach.id)
      return { ...ach, isEarned: !!ua, earnedAt: ua?.earnedAt || null }
    })
  }
}
export const dashboardService = new DashboardService()`},

'c/src/api/axios.ts':{g:'client',i:'📡',l:'ts',n:'axios.ts',p:'api/',c:`import axios from 'axios'

const BASE_URL = import.meta.env.VITE_API_URL || '/api/v1'

export const api = axios.create({
  baseURL: BASE_URL, withCredentials: true,
  headers: { 'Content-Type': 'application/json' },
})

api.interceptors.request.use((config) => {
  const token = localStorage.getItem('accessToken')
  if (token) config.headers.Authorization = \`Bearer \${token}\`
  return config
})

let isRefreshing = false
let failedQueue: any[] = []

const processQueue = (error: any, token: string | null = null) => {
  failedQueue.forEach((p) => error ? p.reject(error) : p.resolve(token))
  failedQueue = []
}

api.interceptors.response.use(
  (res) => res,
  async (error) => {
    const orig = error.config
    if (error.response?.status === 401 && !orig._retry) {
      if (isRefreshing) {
        return new Promise((resolve, reject) => failedQueue.push({ resolve, reject }))
          .then((t) => { orig.headers.Authorization = \`Bearer \${t}\`; return api(orig) })
      }
      orig._retry = true; isRefreshing = true
      try {
        const res = await axios.post(\`\${BASE_URL}/auth/refresh\`, {}, { withCredentials: true })
        const { accessToken } = res.data.data
        localStorage.setItem('accessToken', accessToken)
        processQueue(null, accessToken)
        return api(orig)
      } catch (e) {
        processQueue(e, null)
        localStorage.removeItem('accessToken')
        window.location.href = '/login'
        return Promise.reject(e)
      } finally { isRefreshing = false }
    }
    return Promise.reject(error)
  }
)
export default api`},

import { persist } from 'zustand/middleware'
import type { User } from '../types'

interface AuthStore {
  user: User | null; accessToken: string | null; isAuthenticated: boolean
  setAuth: (user: User, token: string) => void
  setUser: (user: User) => void
  logout: () => void
}

export const useAuthStore = create<AuthStore>()(
  persist(
    (set) => ({
      user: null, accessToken: null, isAuthenticated: false,
      setAuth: (user, token) => {
        localStorage.setItem('accessToken', token)
        set({ user, accessToken: token, isAuthenticated: true })
      },
      setUser: (user) => set({ user }),
      logout: () => {
        localStorage.removeItem('accessToken')
        set({ user: null, accessToken: null, isAuthenticated: false })
      },
    }),
    { name: 'devprep-auth', partialize: (s) => ({ user: s.user, accessToken: s.accessToken, isAuthenticated: s.isAuthenticated }) }

)`},

'c/src/pages/QuestionBank.tsx':{g:'client',i:'📚',l:'tsx',n:'QuestionBank.tsx',p:'pages/',c:`import { useState } from 'react'
import { useQuery, useMutation, useQueryClient } from '@tanstack/react-query'
import { Search, BookmarkPlus, Bookmark, ChevronRight, Filter } from 'lucide-react'
import { questionsApi } from '../api/questions.api'
import { Badge, PageLoader, EmptyState, Modal } from '../components/ui'
import type { Question, Category } from '../types'

export default function QuestionBank() {
  const qc = useQueryClient()
  const [search, setSearch] = useState('')
  const [categoryId, setCategoryId] = useState('')
  const [difficulty, setDifficulty] = useState('')
  const [page, setPage] = useState(1)
  const [selected, setSelected] = useState<Question | null>(null)

  const params: any = { page, limit: 15 }
  if (search) params.search = search
  if (categoryId) params.categoryId = categoryId
  if (difficulty) params.difficulty = difficulty

  const { data, isLoading } = useQuery({
    queryKey: ['questions', params],
    queryFn: () => questionsApi.getQuestions(params).then((r) => r.data),
  })
  const { data: cats } = useQuery({
    queryKey: ['categories'],
    queryFn: () => questionsApi.getCategories().then((r) => r.data.data as Category[]),
  })
  const bookmarkMut = useMutation({
    mutationFn: (id: string) => questionsApi.toggleBookmark(id),
    onSuccess: () => qc.invalidateQueries({ queryKey: ['questions'] }),
  })

  const questions: Question[] = data?.data || []
  const pagination = data?.pagination
  const grouped = (cats || []).reduce<Record<string, Category[]>>((acc, c) => {
    if (!acc[c.group]) acc[c.group] = []
    acc[c.group].push(c)
    return acc
  }, {})

  return (
    <div className="flex gap-6 animate-slide-up">
      <aside className="w-56 shrink-0 space-y-2">
        <div className="card p-4">
          <h3 className="text-xs uppercase tracking-widest text-slate-400 mb-3">Kategoriyalar</h3>
          <button onClick={() => { setCategoryId(''); setPage(1) }}
            className={\`w-full text-left text-sm px-2 py-1.5 rounded-lg mb-1 transition-colors \${!categoryId ? 'text-accent-500 bg-accent-50' : 'text-slate-400 hover:text-white hover:bg-slate-800'}\`}>
            Barcha savollar
          </button>
          {Object.entries(grouped).map(([group, cs]) => (
            <div key={group} className="mb-3">
              <div className="text-xs text-slate-600 uppercase px-2 mb-1">{group}</div>
              {cs.map((c) => (
                <button key={c.id} onClick={() => { setCategoryId(c.id); setPage(1) }}
                  className={\`w-full text-left text-sm px-2 py-1.5 rounded-lg transition-colors \${categoryId === c.id ? 'text-accent-500 bg-accent-50' : 'text-slate-400 hover:text-white hover:bg-slate-800'}\`}>
                  <span className="flex justify-between"><span>{c.name}</span><span className="text-xs text-slate-600">{c.questionCount}</span></span>
                </button>
              ))}
            </div>
          ))}
        </div>
        <div className="card p-4">
          <h3 className="text-xs uppercase tracking-widest text-slate-400 mb-3">Qiyinlik</h3>
          {['', 'EASY', 'MEDIUM', 'HARD'].map((d) => (
            <button key={d} onClick={() => { setDifficulty(d); setPage(1) }}
              className={\`w-full text-left text-sm px-2 py-1.5 rounded-lg mb-0.5 transition-colors \${difficulty === d ? 'text-accent-500 bg-accent-50' : 'text-slate-400 hover:text-white hover:bg-slate-800'}\`}>
              {d ? {EASY:'Oson',MEDIUM:"O'rta",HARD:'Qiyin'}[d] : 'Barchasi'}
            </button>
          ))}
        </div>
      </aside>

      <div className="flex-1 min-w-0">
        <div className="relative mb-4">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
          <input className="input pl-9" placeholder="Savol qidirish..."
            value={search} onChange={(e) => { setSearch(e.target.value); setPage(1) }} />
        </div>
        <div className="flex items-center gap-3 mb-4 text-xs text-slate-400">
          <Filter size={13} />
          <span>{pagination?.total || 0} ta savol</span>
          {(categoryId || difficulty || search) && (
            <button onClick={() => { setCategoryId(''); setDifficulty(''); setSearch(''); setPage(1) }}
              className="text-accent-500 hover:underline">Filtrni tozalash</button>
          )}
        </div>
        {isLoading ? <PageLoader /> : questions.length === 0 ? (
          <EmptyState icon="🔍" title="Savollar topilmadi" />
        ) : (
          <div className="space-y-2">
            {questions.map((q) => (
              <div key={q.id} onClick={() => setSelected(q)}
                className="card p-4 hover:border-slate-700 cursor-pointer group flex items-start gap-4">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                    <Badge variant={q.difficulty.toLowerCase() as any}>{q.difficulty}</Badge>
                    <Badge variant={q.category.group.toLowerCase() as any}>{q.category.name}</Badge>
                    <span className="text-xs text-slate-500">{q.type === 'OPEN_ENDED' ? '✍️ Ochiq' : '📋 Test'}</span>
                  </div>
                  <p className="text-sm text-slate-200 group-hover:text-white line-clamp-2">{q.title}</p>
                  {q.tags.length > 0 && (
                    <div className="flex gap-1.5 mt-2">
                      {q.tags.slice(0,3).map((t) => <span key={t} className="text-xs text-slate-500 bg-slate-800 px-2 py-0.5 rounded">#{t}</span>)}
                    </div>
                  )}
                </div>
                <button onClick={(e) => { e.stopPropagation(); bookmarkMut.mutate(q.id) }}
                  className={\`p-1.5 rounded-lg transition-colors \${q.isBookmarked ? 'text-accent-500 bg-accent-50' : 'text-slate-600 hover:text-accent-500'}\`}>
                  {q.isBookmarked ? <Bookmark size={15} fill="currentColor" /> : <BookmarkPlus size={15} />}
                </button>
              </div>
            ))}
          </div>
        )}
        {pagination && pagination.totalPages > 1 && (
          <div className="flex items-center justify-center gap-2 mt-6">
            <button onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1} className="btn-secondary text-xs px-3 py-1.5 disabled:opacity-40">← Oldingi</button>
            <span className="text-xs text-slate-400">{page} / {pagination.totalPages}</span>
            <button onClick={() => setPage(p => Math.min(pagination.totalPages,p+1))} disabled={page===pagination.totalPages} className="btn-secondary text-xs px-3 py-1.5 disabled:opacity-40">Keyingi →</button>
          </div>
        )}
      </div>

      <Modal isOpen={!!selected} onClose={() => setSelected(null)} title="Savol tafsiloti">
        {selected && (
          <div className="space-y-4">
            <p className="text-slate-200 text-sm font-semibold leading-relaxed">{selected.title}</p>
            {selected.options && (
              <div className="space-y-2">
                {selected.options.map((o) => (
                  <div key={o.id} className={\`p-3 rounded-lg text-sm border \${o.isCorrect ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-300' : 'bg-slate-800/50 border-slate-700 text-slate-400'}\`}>
                    {o.isCorrect && '✓ '}{o.text}
                  </div>
                ))}
              </div>
            )}
            {selected.correctAnswer && (
              <div className="p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                <div className="text-xs text-emerald-400 mb-1">To'g'ri javob</div>
                <p className="text-sm text-emerald-300">{selected.correctAnswer}</p>
              </div>
            )}
            {selected.explanation && (
              <div className="p-3 rounded-lg bg-slate-800 border border-slate-700">
                <div className="text-xs text-slate-400 mb-1">Tushuntirish</div>
                <p className="text-sm text-slate-300">{selected.explanation}</p>
              </div>
            )}
          </div>
        )}
      </Modal>
    </div>
  )
}`},

'c/src/pages/AIInterview.tsx':{g:'client',i:'🤖',l:'tsx',n:'AIInterview.tsx',p:'pages/',c:`import { useState } from 'react'
import { useMutation } from '@tanstack/react-query'
import { Bot, Send, Lightbulb, BookOpen, ChevronRight, RefreshCw, Star } from 'lucide-react'
import { aiApi } from '../api/ai.api'
import { Spinner, Badge } from '../components/ui'
import type { AIEvalResult, Question } from '../types'

const tracks = [
  { value: 'FRONTEND', label: '🎨 Frontend', desc: 'HTML, CSS, JS, React' },
  { value: 'BACKEND', label: '⚙️ Backend', desc: 'Node.js, APIs, DB' },
  { value: 'FULLSTACK', label: '🚀 Full Stack', desc: 'Har ikki tomon' },
]

export default function AIInterview() {
  const [track, setTrack] = useState('')
  const [questions, setQuestions] = useState<Question[]>([])
  const [idx, setIdx] = useState(0)
  const [answer, setAnswer] = useState('')
  const [result, setResult] = useState<AIEvalResult | null>(null)
  const [phase, setPhase] = useState<'select' | 'answer' | 'result'>('select')

  const startMut = useMutation({
    mutationFn: () => aiApi.startMockInterview(track, 5).then((r) => r.data.data),
    onSuccess: (data) => { setQuestions(data); setIdx(0); setPhase('answer'); setAnswer(''); setResult(null) },
  })

  const evalMut = useMutation({
    mutationFn: () => aiApi.evaluate({
      questionText: questions[idx].title,
      userAnswer: answer,
      category: questions[idx].category?.name,
    }).then((r) => r.data.data as AIEvalResult),
    onSuccess: (data) => { setResult(data); setPhase('result') },
  })

  const sc = (n: number) => n >= 8 ? 'text-emerald-400' : n >= 5 ? 'text-amber-400' : 'text-rose-400'

  return (
    <div className="max-w-3xl mx-auto animate-slide-up space-y-6">
      <div className="flex items-center gap-3">
        <div className="w-10 h-10 rounded-xl bg-violet-500/20 flex items-center justify-center">
          <Bot size={20} className="text-violet-400" />
        </div>
        <div>
          <h1 className="font-sans font-bold text-2xl text-white">AI Interview</h1>
          <p className="text-slate-400 text-sm">Javoblaringizni Claude AI baholaydi</p>
        </div>
      </div>

      {phase === 'select' && (
        <div className="card space-y-4">
          <h2 className="font-semibold text-white">Yo'nalishni tanlang</h2>
          <div className="grid grid-cols-3 gap-3">
            {tracks.map((t) => (
              <button key={t.value} onClick={() => setTrack(t.value)}
                className={\`p-4 rounded-xl border text-left transition-all \${track === t.value ? 'bg-violet-500/10 border-violet-500/30 text-violet-300' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-600'}\`}>
                <div className="font-semibold mb-1">{t.label}</div>
                <div className="text-xs opacity-70">{t.desc}</div>
              </button>
            ))}
          </div>
          <button onClick={() => startMut.mutate()} disabled={!track || startMut.isPending}
            className="btn-primary w-full flex items-center justify-center gap-2">
            {startMut.isPending ? <Spinner size={16} /> : <Bot size={16} />}
            Intervyuni boshlash
          </button>
        </div>
      )}

      {phase === 'answer' && questions[idx] && (
        <div className="space-y-4">
          <div className="flex justify-between text-xs text-slate-400">
            <span>Savol {idx+1}/{questions.length}</span>
            <div className="flex gap-1">
              {questions.map((_,i) => <div key={i} className={\`w-2 h-2 rounded-full \${i===idx?'bg-violet-400':i<idx?'bg-emerald-400':'bg-slate-700'}\`} />)}
            </div>
          </div>
          <div className="card">
            <div className="flex gap-2 mb-3">
              <Badge variant={questions[idx].difficulty.toLowerCase() as any}>{questions[idx].difficulty}</Badge>
              <span className="text-xs text-slate-500">{questions[idx].category?.name}</span>
            </div>
            <p className="text-slate-100 font-semibold leading-relaxed">{questions[idx].title}</p>
          </div>
          <textarea value={answer} onChange={(e) => setAnswer(e.target.value)}
            placeholder="Bu yerga javobingizni yozing..."
            className="input min-h-[160px] resize-none w-full" />
          <button onClick={() => evalMut.mutate()} disabled={!answer.trim() || evalMut.isPending}
            className="btn-primary w-full flex items-center justify-center gap-2">
            {evalMut.isPending ? <><Spinner size={16} /> AI baholayapti...</> : <><Send size={16} /> AI baholash</>}
          </button>
        </div>
      )}

      {phase === 'result' && result && (
        <div className="space-y-4 animate-slide-up">
          <div className="card flex items-center gap-6">
            <div className="text-center">
              <div className={\`font-sans font-bold text-5xl \${sc(result.score)}\`}>{result.score}</div>
              <div className="text-xs text-slate-400 mt-1">/ 10</div>
            </div>
            <div className="flex-1">
              <div className="flex gap-1 mb-2">
                {Array.from({length:10},(_,i) => <div key={i} className={\`flex-1 h-2 rounded-full \${i<result.score?(result.score>=8?'bg-emerald-400':result.score>=5?'bg-amber-400':'bg-rose-400'):'bg-slate-700'}\`} />)}
              </div>
              <p className="text-sm text-slate-300">{result.feedback}</p>
            </div>
          </div>
          {result.mistakes.length > 0 && (
            <div className="card border-rose-500/20">
              <div className="text-rose-400 text-sm font-semibold mb-2">⚠️ Kamchiliklar</div>
              {result.mistakes.map((m,i) => <p key={i} className="text-sm text-slate-300 flex gap-2"><span className="text-rose-500">•</span>{m}</p>)}
            </div>
          )}
          <div className="card border-emerald-500/20">
            <div className="flex items-center gap-2 text-emerald-400 text-sm font-semibold mb-2"><Lightbulb size={15}/> Ideal javob</div>
            <p className="text-sm text-slate-300 leading-relaxed">{result.idealAnswer}</p>
          </div>
          {result.keyPoints.length > 0 && (
            <div className="card">
              <div className="flex items-center gap-2 text-amber-400 text-sm font-semibold mb-2"><Star size={15}/> Asosiy tushunchalar</div>
              <div className="flex flex-wrap gap-2">
                {result.keyPoints.map((kp,i) => <span key={i} className="px-2.5 py-1 bg-amber-500/10 border border-amber-500/20 rounded-lg text-xs text-amber-300">{kp}</span>)}
              </div>
            </div>
          )}
          {result.resources.length > 0 && (
            <div className="card">
              <div className="flex items-center gap-2 text-accent-500 text-sm font-semibold mb-2"><BookOpen size={15}/> Materiallar</div>
              {result.resources.map((r,i) => (
                <a key={i} href={r.url} target="_blank" rel="noreferrer"
                  className="flex items-center justify-between p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 group mb-1">
                  <span className="text-sm text-slate-300 group-hover:text-white">{r.title}</span>
                  <ChevronRight size={13} className="text-slate-500 group-hover:text-accent-500"/>
                </a>
              ))}
            </div>
          )}
          <button onClick={() => { if(idx<questions.length-1){setIdx(i=>i+1);setAnswer('');setResult(null);setPhase('answer')}else{setPhase('select');setQuestions([])} }}
            className="btn-primary w-full flex items-center justify-center gap-2">
            <RefreshCw size={15}/>{idx<questions.length-1?'Keyingi savol':'Yakunlash'}
          </button>
        </div>
      )}
    </div>
  )
}`},

'c/src/pages/Leaderboard.tsx':{g:'client',i:'🏆',l:'tsx',n:'Leaderboard.tsx',p:'pages/',c:`import { useQuery } from '@tanstack/react-query'
import { Trophy } from 'lucide-react'
import { quizApi } from '../api/quiz.api'
import { PageLoader } from '../components/ui'
import { useAuthStore } from '../store/authStore'
import type { LeaderboardEntry } from '../types'

export default function Leaderboard() {
  const { user } = useAuthStore()
  const { data, isLoading } = useQuery({
    queryKey: ['leaderboard'],
    queryFn: () => quizApi.getLeaderboard().then((r) => r.data.data as LeaderboardEntry[]),
  })
  const trackLabel: Record<string, string> = { FRONTEND: 'Frontend', BACKEND: 'Backend', FULLSTACK: 'Full Stack' }
  const icons = ['🥇', '🥈', '🥉']
  const colors = ['text-amber-400', 'text-slate-400', 'text-orange-600']

  return (
    <div className="max-w-2xl mx-auto animate-slide-up space-y-6">
      <div className="flex items-center gap-3">
        <Trophy size={24} className="text-amber-400" />
        <div>
          <h1 className="font-sans font-bold text-2xl text-white">Liderlar jadvali</h1>
          <p className="text-slate-400 text-sm">Eng yaxshi o'quvchilar</p>
        </div>
      </div>
      {isLoading ? <PageLoader /> : (
        <div className="space-y-2">
          {(data || []).map((e) => (
            <div key={e.user?.id} className={\`card flex items-center gap-4 transition-all \${e.user?.id===user?.id?'border-accent-200/50 bg-accent-50':'hover:border-slate-700'}\`}>
              <div className={\`w-10 text-center font-bold text-lg \${colors[e.rank-1]||'text-slate-500'}\`}>
                {e.rank<=3?icons[e.rank-1]:\`#\${e.rank}\`}
              </div>
              <div className="w-9 h-9 rounded-full bg-gradient-to-br from-accent-500 to-violet-500 flex items-center justify-center font-bold text-dark-900 text-sm shrink-0">

'c/src/pages/Profile.tsx':{g:'client',i:'👤',l:'tsx',n:'Profile.tsx',p:'pages/',c:`import { useState } from 'react'
import { useMutation } from '@tanstack/react-query'
import { Save } from 'lucide-react'
import { authApi } from '../api/auth.api'
import { useAuthStore } from '../store/authStore'
import { Alert, Spinner } from '../components/ui'

const tracks = [
  { value: 'FRONTEND', label: '🎨 Frontend' },
  { value: 'BACKEND', label: '⚙️ Backend' },
  { value: 'FULLSTACK', label: '🚀 Full Stack' },
]

export default function Profile() {
  const { user, setUser } = useAuthStore()
  const [form, setForm] = useState({ fullName: user?.fullName||'', track: user?.track||'' })
  const [pass, setPass] = useState({ currentPassword: '', newPassword: '' })
  const [msg, setMsg] = useState(''); const [err, setErr] = useState('')

  const profileMut = useMutation({
    mutationFn: () => authApi.updateProfile(form).then((r) => r.data.data),
    onSuccess: (data) => { setUser(data); setMsg('Profil yangilandi!'); setErr('') },
    onError: (e: any) => { setErr(e.response?.data?.message||'Xatolik'); setMsg('') },
  })
  const passMut = useMutation({
    mutationFn: () => authApi.changePassword(pass.currentPassword, pass.newPassword),
    onSuccess: () => { setMsg('Parol yangilandi!'); setErr(''); setPass({ currentPassword:'', newPassword:'' }) },
    onError: (e: any) => { setErr(e.response?.data?.message||'Xatolik'); setMsg('') },
  })

  return (
    <div className="max-w-xl mx-auto animate-slide-up space-y-6">
      <h1 className="font-sans font-bold text-2xl text-white">Profil</h1>
      {msg && <Alert type="success" message={msg} />}
      {err && <Alert type="error" message={err} />}

      <div className="card flex items-center gap-4">
        <div className="w-16 h-16 rounded-full bg-gradient-to-br from-accent-500 to-violet-500 flex items-center justify-center font-bold text-dark-900 text-2xl">
          {user?.fullName?.charAt(0)}
        </div>
        <div>
          <div className="font-bold text-white text-lg">{user?.fullName}</div>
          <div className="text-slate-400 text-sm">{user?.email}</div>
          <div className="text-xs text-slate-500 mt-1">{user?.role==='ADMIN'?'👑 Admin':'👤 User'}</div>
        </div>
      </div>

      <div className="card space-y-4">
        <h3 className="font-semibold text-white text-sm">Shaxsiy ma'lumotlar</h3>
        <div>
          <label className="text-xs text-slate-400 uppercase tracking-wider mb-1.5 block">To'liq ism</label>
          <input className="input" value={form.fullName} onChange={(e) => setForm({...form, fullName: e.target.value})} />
        </div>
        <div>
          <label className="text-xs text-slate-400 uppercase tracking-wider mb-1.5 block">Yo'nalish</label>
          <div className="grid grid-cols-3 gap-2">
            {tracks.map((t) => (
              <button key={t.value} onClick={() => setForm({...form, track: form.track===t.value?'':t.value})}
                className={\`p-2 rounded-lg text-xs font-semibold border transition-all \${form.track===t.value?'bg-accent-100 border-accent-200 text-accent-500':'bg-slate-800 border-slate-700 text-slate-400'}\`}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <button onClick={() => profileMut.mutate()} disabled={profileMut.isPending}
          className="btn-primary flex items-center gap-2">
          {profileMut.isPending?<Spinner size={14}/>:<Save size={14}/>} Saqlash
        </button>
      </div>

      <div className="card space-y-4">
        <h3 className="font-semibold text-white text-sm">Parolni o'zgartirish</h3>
        <div>
          <label className="text-xs text-slate-400 uppercase tracking-wider mb-1.5 block">Joriy parol</label>
          <input type="password" className="input" value={pass.currentPassword} onChange={(e) => setPass({...pass, currentPassword: e.target.value})} />
        </div>
        <div>
          <label className="text-xs text-slate-400 uppercase tracking-wider mb-1.5 block">Yangi parol</label>
          <input type="password" className="input" value={pass.newPassword} onChange={(e) => setPass({...pass, newPassword: e.target.value})} />
        </div>
        <button onClick={() => passMut.mutate()} disabled={passMut.isPending||!pass.currentPassword}
          className="btn-secondary flex items-center gap-2">
          {passMut.isPending&&<Spinner size={14}/>} Yangilash
        </button>
      </div>
    </div>
  )
}`},

// ════════════════════════════════════════════════════════════════════

const SECTIONS = [
  { g:'server', label:'⚙️ Server', clr:'#10b981',
    keys:['s/prisma/schema.prisma','s/src/app.ts','s/src/config/env.ts','s/src/utils/jwt.ts','s/src/utils/response.ts','s/src/middleware/auth.ts','s/src/modules/auth/auth.schema.ts','s/src/modules/auth/auth.service.ts','s/src/modules/questions/questions.service.ts','s/src/modules/quizzes/quizzes.service.ts','s/src/modules/ai/ai.service.ts','s/src/modules/dashboard/dashboard.service.ts']
  },
  { g:'client', label:'⚛️ Client', clr:'#00d4ff',
    keys:['c/tailwind.config.ts','c/src/index.css','c/src/api/axios.ts','c/src/store/authStore.ts','c/src/types/index.ts','c/src/pages/auth/Login.tsx','c/src/pages/Dashboard.tsx','c/src/pages/QuestionBank.tsx','c/src/pages/AIInterview.tsx','c/src/pages/Leaderboard.tsx','c/src/pages/Achievements.tsx','c/src/pages/Profile.tsx']
  },
  { g:'docs', label:'📚 Docs', clr:'#a78bfa',
    keys:['d/DEPLOY.md','d/API.md','d/LOCAL_SETUP.md']
  },
]

// ════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════
let tabs=[], active=null

function gname(key){ return F[key]?.n||key.split('/').pop() }

function buildTree(q=''){
  const el=document.getElementById('tree')
  el.innerHTML=''
  SECTIONS.forEach(sec=>{
    const keys=sec.keys.filter(k=>!q||gname(k).toLowerCase().includes(q.toLowerCase()))
    if(!keys.length) return
    const g=document.createElement('div')
    const h=document.createElement('div')
    h.className='grp-hdr'
    h.innerHTML=`<span style="color:${sec.clr}">${sec.label}</span><span>${keys.length} fayl</span>`
    g.appendChild(h)
    keys.forEach(key=>{
      const f=F[key]; if(!f) return
      const d=document.createElement('div')
      d.className='f-item'+(active===key?' active':'')
      d.innerHTML=`${f.i} ${f.p?`<span class="f-sub">${f.p}</span>`:''}<span>${f.n}</span>`
      d.onclick=()=>openFile(key)
      g.appendChild(d)
    })
    el.appendChild(g)
  })
}

function search(q){ buildTree(q) }

function openFile(key){
  active=key
  if(!tabs.includes(key)){ tabs.push(key); if(tabs.length>8) tabs.shift() }
  renderTabs(); renderCode(key)
  buildTree(document.getElementById('si')?.value||'')
}

function renderTabs(){
  const el=document.getElementById('tabs')
  el.innerHTML=''
  if(!tabs.length){ el.innerHTML='<span style="padding:0 16px;font-size:11px;color:var(--tx3);display:flex;align-items:center">Fayl tanlang →</span>'; return }
  tabs.forEach(key=>{
    const f=F[key]
    const d=document.createElement('div')
    d.className='tab'+(key===active?' active':'')
    d.innerHTML=`${f?.i||'📄'} ${f?.n||gname(key)}<span class="x" data-k="${key}">×</span>`
    d.onclick=e=>{ if(e.target.dataset?.k) closeTab(e.target.dataset.k); else openFile(key) }
    el.appendChild(d)
  })
}

function closeTab(key){
  tabs=tabs.filter(k=>k!==key)
  if(active===key){ active=tabs[tabs.length-1]||null; active?renderCode(active):showEmpty() }
  renderTabs(); buildTree(document.getElementById('si')?.value||'')
}

function renderCode(key){
  const f=F[key]; if(!f) return
  const area=document.getElementById('ca')
  const lines=f.c.split('\n')
  const lns=lines.map((_,i)=>`<div class="ln">${i+1}</div>`).join('')
  area.innerHTML=`
    <div class="code-bar">
      <span class="code-path">${key.replace('s/','server/').replace('c/','client/').replace('d/','docs/')}</span>
      <button class="copy-btn" id="cb" onclick="doCopy('${key}')">📋 Nusxa</button>
    </div>
    <div class="code-scroll">
      <div class="lns">${lns}</div>
      <div class="code">${hl(f.c,f.l)}</div>
    </div>`
  document.getElementById('sp').textContent=`${f.i} ${f.n} — ${lines.length} qator`
  document.getElementById('sl').textContent=`${f.l.toUpperCase()} · UTF-8`
}

function showEmpty(){
  document.getElementById('ca').innerHTML='<div class="empty"><div class="empty-i">📂</div><span>Chapdan fayl tanlang</span></div>'
  document.getElementById('sp').textContent='DevPrep AI v1.0 — tayyor'
}

function doCopy(key){
  navigator.clipboard.writeText(F[key]?.c||'').then(()=>{
    const b=document.getElementById('cb')
    if(b){b.textContent='✅ Nusxalandi';b.classList.add('ok')}
    setTimeout(()=>{ if(b){b.textContent='📋 Nusxa';b.classList.remove('ok')} },2000)
  })
}

function hl(code,lang){
  let c=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  if(lang==='json'){
    c=c.replace(/("[\w\-]+")\s*:/g,'<span class="pr">$1</span>:')
       .replace(/:\s*("[^"]*")/g,': <span class="str">$1</span>')
       .replace(/:\s*(\d[\d.]*)/g,': <span class="num">$1</span>')
       .replace(/:\s*(true|false|null)/g,': <span class="kw">$1</span>')
  } else if(lang==='prisma'){
    c=c.replace(/\/\/.*/g,'<span class="cmt">$&</span>')
       .replace(/"[^"]*"/g,'<span class="str">$&</span>')
       .replace(/\b(model|enum|generator|datasource)\b/g,'<span class="kw">$&</span>')
       .replace(/\b(String|Int|Boolean|Float|DateTime|Json)\b/g,'<span class="tp">$&</span>')
       .replace(/@[\w]+(\([^)]*\))?/g,'<span class="dc">$&</span>')
  } else if(lang==='css'){
    c=c.replace(/\/\*.[\s\S]*?\*\//g,'<span class="cmt">$&</span>')
       .replace(/"[^"]*"/g,'<span class="str">$&</span>')
       .replace(/@[\w-]+/g,'<span class="kw">$&</span>')
       .replace(/([\w-]+)\s*:/g,'<span class="pr">$1</span>:')
       .replace(/:\s*([^;{}\n]+)/g,(m,v)=>`: <span class="str">${v}</span>`)
  } else if(lang==='md'){
    c=c.replace(/^(#{1,3} .+)$/gm,'<span class="cls">$1</span>')
       .replace(/\*\*([^*]+)\*\*/g,'<span class="str">$1</span>')
       .replace(/`([^`]+)`/g,'<span class="tp">$1</span>')
       .replace(/^(\|.+\|)$/gm,'<span class="cmt">$1</span>')
       .replace(/^( {2}[\w.#$].+)$/gm,'<span class="fn">$1</span>')
  } else {
    c=c.replace(/\/\/.*/g,'<span class="cmt">$&</span>')
       .replace(/\/\*[\s\S]*?\*\//g,'<span class="cmt">$&</span>')
       .replace(/`[^`]*`/g,m=>`<span class="str">${m}</span>`)
       .replace(/"([^"\\]|\\.)*"/g,'<span class="str">$&</span>')
       .replace(/'([^'\\]|\\.)*'/g,'<span class="str">$&</span>')
       .replace(/\b(import|export|from|default|const|let|var|function|class|interface|type|enum|return|async|await|try|catch|throw|new|if|else|for|of|in|extends|implements|null|undefined|true|false|void)\b/g,'<span class="kw">$&</span>')
       .replace(/\b(string|number|boolean|any|never|unknown)\b/g,'<span class="tp">$&</span>')
       .replace(/\b([A-Z][a-zA-Z0-9]+)\b(?!\s*[=:])/g,'<span class="cls">$&</span>')
       .replace(/\b(\d+)\b/g,'<span class="num">$1</span>')
  }
  return c
}

// Init
buildTree()
openFile('s/prisma/schema.prisma')
</script>
</body>
